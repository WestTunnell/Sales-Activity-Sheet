async function loadData() {
  try {
    let raw = null;
    if (window.storage) {
      const r = await window.storage.get(STORAGE_KEY);
      if (r) raw = r.value;
    } else {
      raw = localStorage.getItem(STORAGE_KEY);
    }
    if (raw) {
      const d = JSON.parse(raw);
      if (!d.settings) d.settings = DEFAULT_DATA.settings;
      if (!d.settings.markets) d.settings.markets = [...DEFAULT_MARKETS];
      d.accounts.forEach(a => {
        if (!a.jobs) a.jobs = [];
        if (!a.markets) a.markets = [];
        a.contacts.forEach(c => c.activities.forEach(act => { if (!("jobId" in act)) act.jobId = null; }));
      });
      return d;
    }
  } catch(e) { console.warn("Load error:", e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

async function saveData(d) {
  try {
    const raw = JSON.stringify(d);
    if (window.storage) {
      await window.storage.set(STORAGE_KEY, raw);
    } else {
      localStorage.setItem(STORAGE_KEY, raw);
    }
  } catch(e) { console.warn("Save error:", e); }
}

function nameSimilarity(a, b) {
  a = a.toLowerCase().trim();
  b = b.toLowerCase().trim();
  if (a === b) return 1;
  if (a.length < 2 || b.length < 2) return 0;
  var getBigrams = function(s) {
    var m = {};
    for (var i = 0; i < s.length - 1; i++) {
      var k = s.slice(i, i+2);
      m[k] = (m[k] || 0) + 1;
    }
    return m;
  };
  var aB = getBigrams(a), bB = getBigrams(b);
  var intersection = 0;
  Object.keys(aB).forEach(function(k) { if (bB[k]) intersection += Math.min(aB[k], bB[k]); });
  var aTotal = Object.values(aB).reduce(function(s,v){return s+v;},0);
  var bTotal = Object.values(bB).reduce(function(s,v){return s+v;},0);
  var total = aTotal + bTotal;
  return total === 0 ? 0 : (2 * intersection) / total;
}

function matchStatus(raw) {
  if (!raw) return "Active Pursuit";
  const s = raw.toLowerCase().trim();
  if (/^won$|awarded|award|selected/.test(s))           return "Won";
  if (/^lost$|no.?award|not.?select|no.?bid|declined/.test(s)) return "Lost";
  if (/hold|pause|defer/.test(s))                       return "On Hold";
  if (/budget|rom|feasib|prelim|study/.test(s))         return "Budget / Budgetary Only";
  if (/submit|sent|pending|under.?review/.test(s))      return "Proposal Pending";
  return JOB_STATUSES.find(j => j.toLowerCase().includes(s) || s.includes(j.toLowerCase())) || "Active Pursuit";
}

function autoMatch(h) {
  const s = h.toLowerCase();
  if (/company|firm|client|org/.test(s))              return "companyName";
  if (/industry/.test(s))                              return "industry";
  if (/market|sector/.test(s))                         return "markets";
  if (/contact|person/.test(s)&&!/email|phone/.test(s)) return "contactName";
  if (/title|role|position/.test(s))                   return "contactTitle";
  if (/email/.test(s))                                  return "contactEmail";
  if (/phone|cell|mobile/.test(s))                     return "contactPhone";
  if (/job|project|opportunity|scope/.test(s))         return "jobName";
  if (/status/.test(s))                                return "jobStatus";
  if (/value|amount|fee|budget|cost/.test(s))          return "jobValue";
  if (/location|city|address|site/.test(s))            return "jobLocation";
  if (/due|decision|date|deadline/.test(s))            return "jobDueDate";
  if (/note|comment/.test(s))                          return "jobNotes";
  if (/tier|priority|rank/.test(s))                    return "tier";
  return "ignore";
}

function DupCard({pair, decision, onDecide, index}) {
  var sim = Math.round(pair.score * 100);
  var simColor = sim >= 90 ? C.red : sim >= 75 ? C.amber : C.gold;
  var decColor = decision==="merge" ? C.blue : decision==="keep_both" ? C.purple : decision==="skip" ? C.textDim : C.border2;
  var borderColor = decision ? decColor : C.border;

  function OptBtn(props) {
    var active = decision === props.val;
    return (
      <button
        onClick={function(){ onDecide(props.val); }}
        style={{borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:active?700:400,border:"1px solid "+(active?props.color+"80":C.border2),background:active?props.color+"20":"transparent",color:active?props.color:C.textLo,fontFamily:C.sans}}
      >
        {props.label}
      </button>
    );
  }

  return (
    <div className="dup-card" style={{...card,marginBottom:10,border:"1px solid "+borderColor,animationDelay:(index*0.05)+"s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:11,color:C.textDim,textTransform:"uppercase",letterSpacing:"0.07em"}}>Possible Duplicate</span>
        <span style={{background:simColor+"20",color:simColor,border:"1px solid "+simColor+"50",borderRadius:5,padding:"2px 8px",fontSize:12,fontWeight:700}}>{sim}% match</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 40px 1fr",gap:8,marginBottom:12,alignItems:"center"}}>
        <div style={{background:"#f8f7f8",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>Existing in SalesOS</div>
          <div style={{fontWeight:700,color:C.textHi,fontSize:14,marginBottom:2}}>{pair.existing.name}</div>
          <div style={{fontSize:12,color:C.textLo,marginBottom:4}}>{pair.existing.industry||"--"}</div>
          <div style={{fontSize:11,color:C.textDim}}>{pair.existing.contacts.length} contacts / {pair.existing.jobs.length} jobs</div>
        </div>
        <div style={{textAlign:"center",color:C.textDim,fontSize:11,fontWeight:700}}>VS</div>
        <div style={{background:"#f0f6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:10,color:C.blue,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>From Your Excel</div>
          <div style={{fontWeight:700,color:C.textHi,fontSize:14,marginBottom:2}}>{pair.imported.name}</div>
          <div style={{fontSize:12,color:C.textLo,marginBottom:4}}>{pair.imported.industry||"--"}</div>
          <div style={{fontSize:11,color:C.textDim}}>{pair.imported.contacts.length} contacts / {pair.imported.jobs.length} jobs</div>
        </div>

        <OptBtn label="+ Merge" val="merge" color={C.blue} />
        <OptBtn label="+ Keep Both" val="keep_both" color={C.purple} />
        <OptBtn label="Skip" val="skip" color={C.textDim} />

function DupReviewStep({dupPairs, decisions, onDecide, onBack, onCommit, totalNew}) {
  var resolved = dupPairs.filter(function(p){ return decisions[p.imported.name]; }).length;
  var allDone = resolved === dupPairs.length;
  var mergeOrKeep = dupPairs.filter(function(p){ return decisions[p.imported.name]==="merge"||decisions[p.imported.name]==="keep_both"; }).length;

  return (
    <div>
      <div style={{background:C.bg,borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{textAlign:"center"}}>
          <div style={{color:C.green,fontWeight:700,fontSize:22}}>{totalNew}</div>
          <div style={{color:C.textDim,fontSize:10,textTransform:"uppercase",letterSpacing:"0.07em"}}>New Accounts</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{color:C.gold,fontWeight:700,fontSize:22}}>{dupPairs.length}</div>
          <div style={{color:C.textDim,fontSize:10,textTransform:"uppercase",letterSpacing:"0.07em"}}>Flagged</div>
        </div>
        <div style={{flex:1}}/>
        <div style={{fontSize:12,color:allDone?C.green:C.textDim}}>{resolved}/{dupPairs.length} resolved</div>
      </div>

      <div style={{background:"#f8f7f8",border:"1px solid "+C.border,borderRadius:8,padding:"9px 14px",marginBottom:16,fontSize:12,color:C.textLo,lineHeight:1.9}}>
        <strong style={{color:C.blue}}>Merge</strong>{" -- fold contacts and jobs into the existing account  "}
        <strong style={{color:C.purple}}>Keep Both</strong>{" -- add as a new separate account  "}
        <strong style={{color:C.textDim}}>Skip</strong>{" -- do not import this account"}
      </div>

      <div style={{maxHeight:380,overflowY:"auto",paddingRight:2}}>
        {dupPairs.map(function(pair, i) {
          return (
            <DupCard
              key={i}
              pair={pair}
              decision={decisions[pair.imported.name]}
              onDecide={function(val){ onDecide(pair.imported.name, val); }}
              index={i}
            />
          );
        })}
      </div>

      <div style={{display:"flex",gap:10,marginTop:18}}>
        <button style={btn(null,C.textLo,C.border2)} onClick={onBack}>Back</button>
        <button
          disabled={!allDone}
          onClick={onCommit}
          style={{...btn(allDone?C.gold:"#e8e7e8","#1a1820"),flex:1,justifyContent:"center",opacity:allDone?1:0.5,cursor:allDone?"pointer":"not-allowed"}}
        >
          {allDone
            ? "Confirm Import (" + totalNew + " new + " + mergeOrKeep + " from duplicates)"
            : "Resolve " + (dupPairs.length - resolved) + " remaining to continue"
          }
        </button>
      </div>
    </div>
  );
}

  const delCon  = id => {upd(d=>{d.accounts.find(a=>a.id===selAcc).contacts=d.accounts.find(a=>a.id===selAcc).contacts.filter(c=>c.id!==id);return d;});setSC(null);setView("account");};

  const generateBrief = async () => {
    setBriefLoading(true);
    setBrief(null);
    try {
      // Build a focused data snapshot for the AI - only actionable signals
      const today = new Date();
      const fmtD = d => d ? new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "";
      const signals = [];

      // Overdue follow-ups
      data.accounts.forEach(acc=>acc.contacts.forEach(con=>con.activities.forEach(act=>{
        if(act.followUp && isOverdue(act.followUp))
          signals.push({type:"overdue_followup", acc:acc.name, con:con.name, role:con.role||"Unknown", actType:act.type, due:act.followUp, notes:act.notes||""});
      })));

      // Tier 1 accounts with no contact in 21+ days
      data.accounts.filter(a=>a.tier===1).forEach(acc=>{
        const acts = acc.contacts.flatMap(c=>c.activities).sort((a,b)=>new Date(b.date)-new Date(a.date));
        const ds = acts[0] ? Math.floor((Date.now()-new Date(acts[0].date))/86400000) : 999;
        if(ds>=21) signals.push({type:"cold_tier1", acc:acc.name, daysSince:ds, contacts:acc.contacts.map(c=>({name:c.name,role:c.role||"Unknown",strength:c.relStrength||0})), notes:acc.notes||""});
      });

      // Jobs with decision dates in next 14 days
      data.accounts.forEach(acc=>acc.jobs.filter(j=>j.dueDate&&!["Won","Lost"].includes(j.status)).forEach(j=>{
        const diff = Math.ceil((new Date(j.dueDate)-today)/86400000);
        if(diff>=0 && diff<=14) signals.push({type:"decision_soon", acc:acc.name, job:j.name, status:j.status, value:fmtVal(j.estimatedValue)||(j.proposals[j.proposals.length-1]?.amount||""), dueDate:j.dueDate, daysLeft:diff, contacts:acc.contacts.map(c=>({name:c.name,role:c.role||"Unknown"})), jobNotes:j.notes||""});
      }));

      // Tier 1/2 accounts with no jobs yet
      data.accounts.filter(a=>(a.tier===1||a.tier===2)&&a.jobs.length===0&&a.contacts.length>0).forEach(acc=>{
        signals.push({type:"no_jobs", acc:acc.name, tier:acc.tier, contacts:acc.contacts.map(c=>({name:c.name,role:c.role||"Unknown"})), notes:acc.notes||""});
      });

      // Active jobs with no activity in 30+ days
      data.accounts.forEach(acc=>acc.jobs.filter(j=>j.status==="Active Pursuit"||j.status==="Proposal Pending").forEach(j=>{
        const linked = acc.contacts.flatMap(c=>c.activities.filter(a=>a.jobId===j.id)).sort((a,b)=>new Date(b.date)-new Date(a.date));
        const ds = linked[0] ? Math.floor((Date.now()-new Date(linked[0].date))/86400000) : 999;
        if(ds>=30) signals.push({type:"stale_active_job", acc:acc.name, job:j.name, status:j.status, daysSince:ds===999?"never":ds, contacts:acc.contacts.map(c=>({name:c.name,role:c.role||"Unknown"}))});
      }));

      if(!signals.length) {
        setBrief([{priority:"low",action:"Your pipeline looks clear today.",detail:"No overdue items, cold accounts, or urgent decisions detected. Good time to log new outreach or scout new prospects.",accId:null,conId:null,jobId:null}]);
        setBriefLoading(false);
        return;
      }

      const prompt = `You are a senior business development advisor for a construction and design firm. Analyze these sales pipeline signals and generate a concise morning briefing with 4-8 specific recommended actions, ordered by priority.

SIGNALS:
${JSON.stringify(signals, null, 2)}

Respond ONLY with a JSON array. Each item must have:
- priority: "critical", "high", or "normal"
- action: one short sentence (max 12 words)  --  the specific thing to do TODAY
- detail: 2-3 sentences of specific, contextual advice referencing actual names, roles, job names, and values. Be direct and tactical. Reference the contact's role when relevant (e.g. "Sarah is your Decision Maker here").
- accName: account name string (for navigation)
- conName: contact name if applicable (or null)
- jobName: job name if applicable (or null)

No preamble, no markdown, no explanation. Raw JSON array only.`;

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      const d = await res.json();
      const txt = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const clean = txt.replace(/```json|```/g,"").trim();
      const items = JSON.parse(clean);
      setBrief(Array.isArray(items)?items:[]);
    } catch(e) {
      console.error("Brief error:",e);
      setBrief([{priority:"normal",action:"Could not generate briefing.",detail:"There was an error connecting to the AI. Check your connection and try again.",accName:null,conName:null,jobName:null}]);

  const openMergeContacts = () => {
    const acc = gAcc();
    if(!acc||acc.contacts.length<2){alert("Need at least 2 contacts to find duplicates.");return;}
    const THRESHOLD = 0.55;
    const pairs = [];
    const used = new Set();
    const contacts = acc.contacts.slice();
    for(var i=0;i<contacts.length;i++){
      for(var j=i+1;j<contacts.length;j++){
        if(used.has(contacts[i].id)||used.has(contacts[j].id)) continue;
        const s = nameSimilarity(contacts[i].name, contacts[j].name);
        if(s>=THRESHOLD){
          pairs.push({a:contacts[i], b:contacts[j], score:s});
          used.add(contacts[i].id);
          used.add(contacts[j].id);
        }
      }
    }
    if(pairs.length===0){alert("No similar contacts found in this account.");return;}
    setMergeConPairs(pairs);
    setMergeConDecs({});
    setModal("mergeContacts");
  };

  const commitMergeContacts = () => {
    const snapPairs = mergeConPairs.slice();
    const snapDecs  = {...mergeConDecs};
    upd(d=>{
      const acc = d.accounts.find(a=>a.id===selAcc);
      if(!acc) return d;
      snapPairs.forEach(pair=>{
        const dec = snapDecs[pair.a.id+":"+pair.b.id];
        if(!dec||dec==="skip") return;
        // keepId is the one to keep, dropId is the one to remove
        const keepId = dec;
        const dropId = dec===pair.a.id ? pair.b.id : pair.a.id;
        const keepCon = acc.contacts.find(c=>c.id===keepId);
        const dropCon = acc.contacts.find(c=>c.id===dropId);
        if(!keepCon||!dropCon) return;
        // Merge activities from dropCon into keepCon (avoid exact date+type dupes)
        dropCon.activities.forEach(act=>{
          const isDupe = keepCon.activities.some(a=>a.date===act.date&&a.type===act.type);
          if(!isDupe) keepCon.activities.push({...act, id:uid()});
        });
        // Sort merged activities by date desc
        keepCon.activities.sort((a,b)=>new Date(b.date)-new Date(a.date));
        // Fill in any blank fields on keepCon from dropCon
        if(!keepCon.title&&dropCon.title) keepCon.title=dropCon.title;
        if(!keepCon.email&&dropCon.email) keepCon.email=dropCon.email;
        if(!keepCon.phone&&dropCon.phone) keepCon.phone=dropCon.phone;
        if(!keepCon.notes&&dropCon.notes) keepCon.notes=dropCon.notes;
        // Remove the dropped contact
        acc.contacts = acc.contacts.filter(c=>c.id!==dropId);
      });
      return d;
    });
    closeModal();
    setMergeConPairs([]);
    setMergeConDecs({});
  };
  const setJobStatus = s => upd(d=>{d.accounts.find(a=>a.id===selAcc).jobs.find(j=>j.id===selJob).status=s;return d;});

    });
    const imported=Object.values(accMap);
    const THRESHOLD=0.60;
    const dups=[], newAccs=[];
    imported.forEach(imp=>{
      const exact=data.accounts.find(a=>a.name.toLowerCase().trim()===imp.name.toLowerCase().trim());
      if(exact){dups.push({imported:imp,existing:exact,score:1.0});return;}
      let best=0,bestMatch=null;
      data.accounts.forEach(a=>{const s=nameSimilarity(a.name,imp.name);if(s>best){best=s;bestMatch=a;}});
      if(best>=THRESHOLD&&bestMatch) dups.push({imported:imp,existing:bestMatch,score:best});
      else newAccs.push(imp);

    setIDups(dups);setINew(newAccs);setDupDecs({});

  const commitImport = () => {
    // Snapshot all import state at call time to avoid stale closure issues
    const snapNew  = iNew.slice();
    const snapDups = iDups.slice();
    const snapDecs = {...dupDecs};
    upd(d=>{
      // 1. Add clean new accounts
      snapNew.forEach(imp=>{
        d.accounts.push({
          id:uid(), name:imp.name, industry:imp.industry||"", markets:imp.markets||[],
          tier:imp.tier||2, dealSize:"", notes:"", pros:[], cons:[],
          contacts:imp.contacts.map(c=>({id:uid(),name:c.name,title:c.title||"",email:c.email||"",phone:c.phone||"",notes:"",activities:[]})),
          jobs:imp.jobs.map(j=>({id:uid(),name:j.name,status:j.status||"Active Pursuit",estimatedValue:j.estimatedValue||"",location:j.location||"",dueDate:j.dueDate||"",notes:j.notes||"",proposals:[]}))
        });
      });
      // 2. Apply decisions for flagged duplicates
      snapDups.forEach(pair=>{
        const dec = snapDecs[pair.imported.name];
        if(dec==="merge"){
          // Match by name since existing.id is from pre-clone snapshot
          const ex = d.accounts.find(a=>a.name.toLowerCase().trim()===pair.existing.name.toLowerCase().trim());
          if(ex){
            pair.imported.contacts.forEach(nc=>{
              if(!ex.contacts.find(c=>c.name.toLowerCase().trim()===nc.name.toLowerCase().trim()))
                ex.contacts.push({id:uid(),name:nc.name,title:nc.title||"",email:nc.email||"",phone:nc.phone||"",notes:"",activities:[]});
            });
            pair.imported.jobs.forEach(nj=>{
              if(!ex.jobs.find(j=>j.name.toLowerCase().trim()===nj.name.toLowerCase().trim()))
                ex.jobs.push({id:uid(),name:nj.name,status:nj.status||"Active Pursuit",estimatedValue:nj.estimatedValue||"",location:nj.location||"",dueDate:nj.dueDate||"",notes:nj.notes||"",proposals:[]});
            });
            (pair.imported.markets||[]).forEach(m=>{if(!ex.markets.includes(m))ex.markets.push(m);});
          }
        } else if(dec==="keep_both"){
          d.accounts.push({
            id:uid(), name:pair.imported.name, industry:pair.imported.industry||"", markets:pair.imported.markets||[],
            tier:pair.imported.tier||2, dealSize:"", notes:"", pros:[], cons:[],
            contacts:pair.imported.contacts.map(c=>({id:uid(),name:c.name,title:c.title||"",email:c.email||"",phone:c.phone||"",notes:"",activities:[]})),
            jobs:pair.imported.jobs.map(j=>({id:uid(),name:j.name,status:j.status||"Active Pursuit",estimatedValue:j.estimatedValue||"",location:j.location||"",dueDate:j.dueDate||"",notes:j.notes||"",proposals:[]}))
          });
        }
        // dec==="skip" -> do nothing
      });
      return d;
    });
    closeModal();
    setIRows([]); setIHdrs([]); setIMap({}); setPF(null);
    setIDups([]); setINew([]); setDupDecs({});
  };

  const JobForm = ({isNew}) => {

        <button style={{...btn(C.gold,"#0a0d13"),width:"100%",justifyContent:"center",marginTop:4}} onClick={()=>{

          else upd(d=>{const acts=d.accounts.find(a=>a.id===selAcc).contacts.find(c=>c.id===selCon).activities;Object.assign(acts.find(x=>x.id===form.id),b);acts.sort((a,b)=>new Date(b.date)-new Date(a.date));return d;});

  const Modals = () => {

          For each pair, pick which contact to <strong style={{color:C.green}}>keep</strong> -- the other's activity history will be merged into it and it will be removed.
        </div>
        <div style={{maxHeight:460,overflowY:"auto",paddingRight:2}}>
          {mergeConPairs.map(function(pair,i){
            var dec = mergeConDecs[pair.a.id+":"+pair.b.id];
            var sim = Math.round(pair.score*100);
            var simColor = sim>=90?C.red:sim>=75?C.amber:C.gold;
            function ConOption(props){
              var con = props.con;
              var isChosen = dec===con.id;
              return (
                <div
                  onClick={function(){setMergeConDecs(function(d){var n={};Object.keys(d).forEach(function(k){n[k]=d[k];});n[pair.a.id+":"+pair.b.id]=con.id;return n;});}}
                  style={{background:isChosen?"#f0fdf4":C.bg,border:"1px solid "+(isChosen?C.green+"80":C.border2),borderRadius:8,padding:"12px 14px",cursor:"pointer",transition:"all 0.15s",flex:1}}

                      style={{background:"none",border:"1px solid "+C.border2,borderRadius:6,color:dec==="skip"?C.textLo:C.textDim,fontSize:11,cursor:"pointer",padding:"2px 8px",fontFamily:C.sans,fontWeight:dec==="skip"?700:400}}

              </div>
            );
          })}

          <button style={btn(null,C.textLo,C.border2)} onClick={closeModal}>Cancel</button>
          <button
            onClick={commitMergeContacts}
            disabled={mergeConPairs.every(function(p){return !mergeConDecs[p.a.id+":"+p.b.id];})}
            style={{...btn(C.gold,"#0a0d13"),flex:1,justifyContent:"center",opacity:mergeConPairs.some(function(p){return mergeConDecs[p.a.id+":"+p.b.id]&&mergeConDecs[p.a.id+":"+p.b.id]!=="skip";})?1:0.5,cursor:"pointer"}}
          >

              <div style={{display:"flex",gap:10,alignItems:"center"}}>{tag(C.blue,act.type)}<span style={{color:C.textDim,fontSize:12}}>{act.date}</span><span style={{color:C.textLo,fontSize:12}}>-- {act.conName}</span></div>
              {act.notes&&<div style={{marginTop:8,color:"#52525b",fontSize:13,lineHeight:1.6}}>{act.notes}</div>}
              {act.followUp&&<div style={{marginTop:8,padding:"4px 10px",borderRadius:6,display:"inline-flex",gap:6,alignItems:"center",fontSize:12,background:isOverdue(act.followUp)?"#fef2f2":"#f0fdf4",border:`1px solid ${isOverdue(act.followUp)?"#fca5a5":"#86efac"}`}}><span style={{color:isOverdue(act.followUp)?C.red:C.green}}>Follow-up: {act.followUp}{isOverdue(act.followUp)?" -- OVERDUE":""}</span></div>}
            </div>
          ))}
        </div>
      </div>
    );
  };

  const ContactView = () => {
    const acc=gAcc();const con=gCon();if(!acc||!con) return null;
    const ds=con.activities[0]?daysSince(con.activities[0].date):null;const col=actColor(ds,YT,RT);
    return (
      <div>
        <Crumb items={[{label:"Accounts",onClick:()=>setView("dash")},{label:acc.name,onClick:()=>{setView("account");setAccTab("contacts");}},{label:con.name}]}/>
        <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:20}}>
          <div>
            <div style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                <div style={{width:46,height:46,borderRadius:"50%",background:"#e8e4f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,color:C.purple,fontWeight:700,letterSpacing:"-0.02em"}}>{con.name.trim().split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}</div>
                <button style={btn(null,C.blue,"#1e3a5a")} onClick={()=>{setForm({...con});setModal("editCon");}}>Edit</button>
              </div>
              <div style={{fontFamily:C.serif,fontSize:19,color:C.textHi,marginBottom:2}}>{con.name}</div>
              <div style={{color:C.textLo,fontSize:13,marginBottom:10}}>{con.title}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
                {con.role&&con.role!=="Unknown"&&<span style={{...pill(ROLE_COLORS[con.role]||C.textDim),fontSize:11}}>{con.role}</span>}
                {con.relStrength>0&&<span style={{fontSize:13,color:"#c8980a",letterSpacing:1}}>{"\u2605".repeat(con.relStrength)}{"\u2606".repeat(5-(con.relStrength||0))}</span>}
                {con.howMet&&<span style={{fontSize:11,color:C.textDim,fontStyle:"italic"}}>via {con.howMet}</span>}
              </div>
              {(con.email||con.phone)&&<><div style={divL}/>{con.email&&<><div style={lbl}>Email</div><div style={{color:C.text,fontSize:13,marginTop:3,marginBottom:10}}>{con.email}</div></>}{con.phone&&<><div style={lbl}>Phone</div><div style={{color:C.text,fontSize:13,marginTop:3,marginBottom:10}}>{con.phone}</div></>}</>}
              <div style={divL}/>
              <div style={lbl}>Last Contact</div>
              <div style={{color:col,fontSize:13,marginTop:3,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>{dot(col)}{actLabel(ds)}</div>
              {con.notes&&<><div style={divL}/><div style={lbl}>Notes</div><div style={{color:"#52525b",fontSize:13,marginTop:6,lineHeight:1.6}}>{con.notes}</div></>}
              {con.activities.length>0&&<><div style={divL}/><div style={lbl}>Activity Breakdown</div><div style={{marginTop:8}}>{ACTIVITY_TYPES.filter(t=>con.activities.some(a=>a.type===t)).map(t=><div key={t} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.textLo,marginBottom:5}}><span>{t}</span><span style={{color:C.text,fontWeight:600}}>{con.activities.filter(a=>a.type===t).length}</span></div>)}</div></>}
            </div>
            <button style={{...btn(null,C.red,"#3d1e1e"),width:"100%",justifyContent:"center"}} onClick={()=>delCon(con.id)}>Remove Contact</button>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontFamily:C.serif,fontSize:18,color:C.textHi}}>Activity Log</div>
              <button style={btn(C.gold,"#0a0d13")} onClick={()=>{setForm({type:"Email",date:new Date().toISOString().slice(0,10)});setModal("addAct");}}>+ Log Activity</button>
            </div>
            {con.activities.length===0&&<div style={{...card,color:C.textDim,textAlign:"center",padding:40}}>No activities yet.</div>}
            {con.activities.map(act=>{
              const lj=acc.jobs.find(j=>j.id===act.jobId);
              return (
                <div key={act.id} style={{...card,marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                      {tag(C.blue,act.type)}
                      <span style={{color:C.textDim,fontSize:12}}>{act.date}</span>
                      {lj&&<button onClick={e=>{e.stopPropagation();setSJ(lj.id);setView("job");}} style={{...pill(STATUS_COLORS[lj.status]),cursor:"pointer",background:"transparent",border:`1px solid ${STATUS_COLORS[lj.status]}50`,fontFamily:C.sans}}>{lj.name}</button>}
                    </div>
                    <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>{setForm({...act,followUp:act.followUp||""});setModal("editAct");}} style={{background:"none",border:"none",color:C.textDim,cursor:"pointer",padding:"4px 6px"}}>Edit</button>
                      <button onClick={()=>delAct(act.id)} style={{background:"none",border:"none",color:"#9ca3af",cursor:"pointer",padding:"4px 6px"}}>Del</button>
                    </div>
                  </div>
                  {act.notes&&<div style={{marginTop:10,color:"#52525b",fontSize:13,lineHeight:1.6}}>{act.notes}</div>}
                  {act.followUp&&<div style={{marginTop:8,padding:"4px 10px",borderRadius:6,display:"inline-flex",gap:6,alignItems:"center",fontSize:12,background:isOverdue(act.followUp)?"#fef2f2":"#f0fdf4",border:`1px solid ${isOverdue(act.followUp)?"#fca5a5":"#86efac"}`}}><span style={{color:isOverdue(act.followUp)?C.red:C.green}}>Follow-up: {act.followUp}{isOverdue(act.followUp)?" -- OVERDUE":""}</span></div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:C.sans,fontSize:14}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",height:58}}>
        <div style={{fontFamily:C.serif,fontSize:22,color:C.textHi,letterSpacing:"-0.02em",cursor:"pointer"}} onClick={()=>setView("dash")}>
          Sales<span style={{color:C.gold}}>OS</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button style={{...btn(null,C.textLo,C.border2),gap:6}} onClick={()=>{setModal("globalSearch");}}>Search</button>
          {alerts.length>0&&<span style={{...pill(C.amber),display:"inline-flex",alignItems:"center",gap:5,cursor:"pointer"}} onClick={()=>setView("dash")}>Overdue: {alerts.length}</span>}
          {winRate!==null&&<span style={{fontSize:12,color:C.textDim,borderLeft:`1px solid ${C.border}`,paddingLeft:10}}>{winRate}% win rate</span>}
          <span style={{color:C.textDim,fontSize:13,borderLeft:`1px solid ${C.border}`,paddingLeft:10}}>{userName}</span>
          <button style={btn(null,C.textLo,C.border2)} onClick={()=>{setForm({});setModal("settings");}}>Settings</button>
        </div>
      </div>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"32px 24px"}}>
        {view==="dash"    &&<DashView/>}
        {view==="account" &&<AccountView/>}
        {view==="job"     &&<JobView/>}
        {view==="contact" &&<ContactView/>}
      </div>
      <Modals/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
