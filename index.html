function migrateData(d) {
  if (!d.settings) d.settings = DEFAULT_DATA.settings;
  if (!d.settings.markets) d.settings.markets = [...DEFAULT_MARKETS];
  if (!d.generalActivities) d.generalActivities = [];
  d.accounts.forEach(a => {
    if(a.jobs) a.jobs.forEach(j=>{if(j.status==="On Hold") j.status="Budget / Budgetary Only";});
    if (!a.jobs) a.jobs = [];
    if (!a.markets) a.markets = [];
    if (!a.contacts) a.contacts = [];
    a.contacts.forEach(con => { if(!con.campaign) con.campaign = null; });
    a.contacts.forEach(c => c.activities.forEach(act => { if (!("jobId" in act)) act.jobId = null; }));
  });
  return d;
}

async function loadData() {
  try {
    const { data, error } = await sb.from(SB_TABLE).select("payload").eq("id", SB_ROW_ID).single();
    if (error && error.code !== "PGRST116") throw error; // PGRST116 = not found
    if (data && data.payload) {
      return migrateData(JSON.parse(data.payload));
    }
    // Fall back to localStorage for one-time migration
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = migrateData(JSON.parse(raw));
      await saveData(d); // migrate to Supabase
      return d;
    }
  } catch(e) { console.warn("Load error:", e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

let _saveTimer = null;
async function saveData(d) {
  try {
    const payload = JSON.stringify(d);
    const { error } = await sb.from(SB_TABLE).upsert({ id: SB_ROW_ID, payload, updated_at: new Date().toISOString() });
    if (error) throw error;
  } catch(e) { console.warn("Save error:", e); }
}

function debouncedSave(d) {
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => saveData(d), 1200);
}

function nameSimilarity(a, b) {
  a = a.toLowerCase().trim();
  b = b.toLowerCase().trim();
  if (a === b) return 1;
  if (a.length < 2 || b.length < 2) return 0;
  var getBigrams = function(s) {
    var m = {};
    for (var i = 0; i < s.length - 1; i++) {
      var k = s.slice(i, i+2);
      m[k] = (m[k] || 0) + 1;
    }
    return m;
  };
  var aB = getBigrams(a), bB = getBigrams(b);
  var intersection = 0;
  Object.keys(aB).forEach(function(k) { if (bB[k]) intersection += Math.min(aB[k], bB[k]); });
  var aTotal = Object.values(aB).reduce(function(s,v){return s+v;},0);
  var bTotal = Object.values(bB).reduce(function(s,v){return s+v;},0);
  var total = aTotal + bTotal;
  return total === 0 ? 0 : (2 * intersection) / total;
}

function matchStatus(raw) {
  if (!raw) return "Active Pursuit";
  const s = raw.toLowerCase().trim();
  if (/^won$|^win$|awarded|award|selected/.test(s))                    return "Won";
  if (/^lost$|^loss$|no.?award|not.?select|declined/.test(s))          return "Lost";
  if (/^no.?bid$|no bid/.test(s))                                       return "No Bid";
  if (/budget|rom|feasib|prelim|study/.test(s))                         return "Budget / Budgetary Only";
  if (/^pending$|submit|sent|under.?review/.test(s))                    return "Proposal Pending";
  if (/^bidding$|^bid$/.test(s))                                        return "Active Pursuit";
  return JOB_STATUSES.find(j => j.toLowerCase().includes(s) || s.includes(j.toLowerCase())) || "Active Pursuit";
}

function autoMatch(h) {
  const s = h.toLowerCase();
  if (/company|firm|client|org/.test(s))              return "companyName";
  if (/industry/.test(s))                              return "industry";
  if (/market|sector/.test(s))                         return "markets";
  if (/contact|person/.test(s)&&!/email|phone/.test(s)) return "contactName";
  if (/title|role|position/.test(s))                   return "contactTitle";
  if (/email/.test(s))                                  return "contactEmail";
  if (/phone|cell|mobile/.test(s))                     return "contactPhone";
  if (/job|project|opportunity|scope/.test(s))         return "jobName";
  if (/status/.test(s))                                return "jobStatus";
  if (/value|amount|fee|budget|cost/.test(s))          return "jobValue";
  if (/location|city|address|site/.test(s))            return "jobLocation";
  if (/due|decision|date|deadline/.test(s))            return "jobDueDate";
  if (/note|comment/.test(s))                          return "jobNotes";
  if (/tier|priority|rank/.test(s))                    return "tier";
  return "ignore";
}

function ContactImportModal({data, upd, closeModal}) {
  const [imgData,   setImgData]   = React.useState(null);
  const [loading,   setLoading]   = React.useState(false);
  const [extracted, setExtracted] = React.useState(null);
  const [saved,     setSaved]     = React.useState(false);
  // resolved[] = array of {con, acc, extractedIdx, action:"update"|"add"|"skip", targetAccId}
  const [resolved,  setResolved]  = React.useState([]);
  const fileRef = React.useRef();

  // Build all contacts flat for matching
  const allConFlat = React.useMemo(function() {
    return data.accounts.flatMap(function(a) {
      return a.contacts.map(function(con) { return {con:con, acc:a}; });
    });
  }, [data]);

  // After extraction, auto-resolve each extracted contact
  React.useEffect(function() {
    if (!extracted) return;
    var res = (extracted.contacts||[]).map(function(ec, i) {
      // 1. Try to match by name against all existing contacts
      var nameCandidates = allConFlat
        .map(function(x) { return {x:x, score:nameSimilarity(x.con.name, ec.name||"")}; })
        .filter(function(x) { return x.score > 0.55; })
        .sort(function(a,b) { return b.score-a.score; });
      if (nameCandidates.length > 0) {
        return {extractedIdx:i, action:"update", con:nameCandidates[0].x.con, acc:nameCandidates[0].x.acc, score:nameCandidates[0].score, targetAccId:null};
      }
      // 2. No name match — try to match account by company name
      var accCandidates = data.accounts
        .map(function(a) { return {a:a, score:nameSimilarity(a.name, extracted.company||"")}; })
        .filter(function(x) { return x.score > 0.35; })
        .sort(function(a,b) { return b.score-a.score; });
      var bestAcc = accCandidates[0];
      return {extractedIdx:i, action:"add", con:null, acc:null, score:0, targetAccId: bestAcc && bestAcc.score>=0.6 ? bestAcc.a.id : "new"};
    });
    setResolved(res);
  }, [extracted]);

  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    var reader = new FileReader();
    reader.onload = function(e) { setImgData(e.target.result); };
    reader.readAsDataURL(file);
  }

  React.useEffect(function() {
    function handlePaste(e) {
      if (imgData) return;
      var items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.startsWith("image/")) {
          handleFile(items[i].getAsFile());
          break;
        }
      }
    }
    window.addEventListener("paste", handlePaste);
    return function() { window.removeEventListener("paste", handlePaste); };
  }, [imgData]);

  async function extract() {
    if (!imgData) return;
    setLoading(true); setExtracted(null);
    try {
      var base64 = imgData.split(",")[1];
      var mediaType = imgData.split(";")[0].split(":")[1];
      var res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: (function(){
          var key = localStorage.getItem('fairco_api_key')||"";
          var h = {"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
          if(key) h["x-api-key"] = key;
          return h;
        })(),
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          messages: [{
            role: "user",
            content: [
              {type:"image", source:{type:"base64", media_type:mediaType, data:base64}},
              {type:"text", text:"Look at this image and extract any company name and people you can see. Respond with ONLY a raw JSON object like this example (no markdown, no backticks, no explanation, just the JSON):\n{\"company\":\"Acme Corp\",\"contacts\":[{\"name\":\"John Smith\",\"title\":\"Project Manager\",\"email\":\"john@acme.com\",\"phone\":\"\",\"notes\":\"\"}]}\nIf you cannot find a company name use empty string. If you cannot find any contacts return an empty array. Use empty string for any field you cannot find."}
            ]
          }]
        })
      });
      var d = await res.json();
      if(d.error) throw new Error(d.error.message||"API error");
      var txt = (d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("").trim();
      txt = txt.replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
      var jsonMatch = txt.match(/\{[\s\S]*\}/);
      if(!jsonMatch) throw new Error("No JSON found in response: "+txt.slice(0,100));
      var parsed = JSON.parse(jsonMatch[0]);
      if(!parsed.contacts) parsed.contacts = [];
      if(!parsed.company) parsed.company = "";
      setExtracted(parsed);
    } catch(err) {
      setExtracted({company:"", contacts:[], error:"Error: "+err.message});
    }
    setLoading(false);
  }

  function updateResolved(i, changes) {
    setResolved(function(r) {
      var n = r.slice();
      n[i] = Object.assign({}, n[i], changes);
      return n;
    });
  }

  function save() {
    upd(function(d) {
      resolved.forEach(function(r) {
        var ec = (extracted.contacts||[])[r.extractedIdx];
        if (!ec) return;
        if (r.action === "skip") return;

        if (r.action === "update" && r.con) {
          // Find the live contact in d and patch empty fields
          d.accounts.forEach(function(acc) {
            var con = acc.contacts.find(function(c){ return c.id === r.con.id; });
            if (con) {
              if (ec.email && !con.email) con.email = ec.email;
              if (ec.phone && !con.phone) con.phone = ec.phone;
              if (ec.title && !con.title) con.title = ec.title;
              if (ec.notes) con.notes = (con.notes ? con.notes+" | " : "") + ec.notes;
            }
          });
          return;
        }

        if (r.action === "add") {
          var acc;
          if (r.targetAccId === "new") {
            acc = {id:uid(), name:extracted.company||"New Account", tier:2, markets:[], pros:[], contacts:[], jobs:[], notes:""};
            d.accounts.push(acc);
          } else {
            acc = d.accounts.find(function(a){ return a.id === r.targetAccId; });
          }
          if (!acc) return;
          var exists = acc.contacts.some(function(ex){ return nameSimilarity(ex.name, ec.name||"") > 0.85; });
          if (!exists) {
            acc.contacts.push({id:uid(), name:ec.name||"", title:ec.title||"", email:ec.email||"", phone:ec.phone||"", howMet:"", notes:ec.notes||"", activities:[], campaign:null});
          }
        }
      });
      return d;
    });
    setSaved(true);
  }

  if (saved) {
    return (
      <div style={{textAlign:"center", padding:"40px 20px"}}>
        <div style={{fontSize:36, marginBottom:12}}>&#10003;</div>

// ── AddToSalesOSForm: parse email signature with Claude, create contact ────────
const AddToSalesOSForm = ({item, dec, setDecision, data, upd}) => {
  const [parsing, setParsing] = React.useState(false);
  const [parsed, setParsed] = React.useState(false);
  const [form, setForm] = React.useState({
    name: item._type === "email_sent"
      ? (item.to&&item.to[0]?item.to[0].name:"")
      : (item.from?item.from.name:""),
    email: item._type === "email_sent"
      ? (item.to&&item.to[0]?item.to[0].email:"")
      : (item.from?item.from.email:""),
    title: "",
    phone: "",
    company: "",
    tier: "Long Game",
    existingAccId: ""
  });
  const upF = k => e => setForm(p=>({...p,[k]:e.target.value}));

  // Auto-parse signature on mount
  React.useEffect(function() {
    if(item.preview && item.preview.length > 20) {
      parseSignature(item.preview);
    }
  }, []);

  async function parseSignature(text) {
    setParsing(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 300,
          messages: [{role:"user", content:
            `Extract contact info from this email text. Return ONLY a JSON object with keys: name, title, phone, company. Use empty string "" if not found. Do not include email. Text:\n\n${text}`
          }]
        })
      });
      const json = await res.json();
      const txt = json.content&&json.content[0]&&json.content[0].text||"{}";
      const clean = txt.replace(/```json|```/g,"").trim();
      const info = JSON.parse(clean);
      setForm(p => ({
        ...p,
        name: info.name || p.name,
        title: info.title || p.title,
        phone: info.phone || p.phone,
        company: info.company || p.company
      }));
      setParsed(true);
    } catch(e) {
      setParsed(true); // still show form even if parse failed
    }
    setParsing(false);
  }

  function save() {
    const contactName = form.name.trim();
    if(!contactName) { alert("Contact name is required"); return; }

    upd(function(d) {
      let acc;
      if(form.existingAccId) {
        acc = d.accounts.find(a=>a.id===form.existingAccId);
      } else if(form.company.trim()) {
        acc = d.accounts.find(a=>a.name.toLowerCase()===form.company.trim().toLowerCase());
        if(!acc) {
          acc = {
            id: "acc_ol_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
            name: form.company.trim(),
            tier: form.tier==="Priority"?1:form.tier==="Developing"?2:3,
            contacts:[], jobs:[], notes:"", lastContact:null, market:[]
          };
          d.accounts.push(acc);
        }
      } else {
        alert("Please enter a company name or select an existing account");
        return d;
      }

      const newCon = {
        id: "con_ol_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
        name: contactName,
        title: form.title||"",
        email: form.email||"",
        phone: form.phone||"",
        notes: "Added via Outlook Sync",
        activities: [],
        campaign: null
      };
      acc.contacts.push(newCon);

      return d;
    });

    // After upd, find the new contact and assign it
    setTimeout(function() {
      const newAcc = form.existingAccId
        ? data.accounts.find(a=>a.id===form.existingAccId)
        : data.accounts.find(a=>a.name.toLowerCase()===(form.company||"").toLowerCase());
      const newCon = newAcc && newAcc.contacts.find(c=>c.name===form.name.trim()&&c.email===form.email);
      if(newCon && newAcc) {
        setDecision(item.id, {
          contactId: newCon.id,
          accId: newAcc.id,
          _manualOverride: true,
          _addingNew: false
        });
      }
    }, 100);
  }

  const inputStyle = {
    width:"100%", padding:"6px 8px", borderRadius:6,
    border:"1px solid #2a2f35", background:"#0d1117",
    color:"#f1f0f4", fontSize:12, boxSizing:"border-box", fontFamily:"inherit"
  };

  return (
    <div style={{marginTop:8,background:"#0d1117",border:"1px solid #22c55e40",borderRadius:8,padding:"12px",width:"100%"}}>
      <div style={{fontSize:11,fontWeight:700,color:"#22c55e",marginBottom:8}}>
        {parsing ? "⏳ Parsing signature..." : parsed ? "✓ Pre-filled from email — review and save" : "New Contact"}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
        <div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>Name *</div>
          <input style={inputStyle} value={form.name} onChange={upF("name")} placeholder="Full name"/>
        </div>
        <div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>Email</div>
          <input style={inputStyle} value={form.email} onChange={upF("email")} placeholder="email@company.com"/>
        </div>
        <div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>Title</div>
          <input style={inputStyle} value={form.title} onChange={upF("title")} placeholder="Project Manager"/>
        </div>
        <div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>Phone</div>
          <input style={inputStyle} value={form.phone} onChange={upF("phone")} placeholder="(602) 555-0000"/>
        </div>
      </div>
      <div style={{marginBottom:6}}>
        <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>Add to existing account</div>
        <select style={{...inputStyle}} value={form.existingAccId} onChange={upF("existingAccId")}>
          <option value="">-- Create new account from company name --</option>
          {data.accounts.sort((a,b)=>a.name.localeCompare(b.name)).map(a=>(
            <option key={a.id} value={a.id}>{a.name}</option>
          ))}
        </select>
      </div>
      {!form.existingAccId && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
          <div>
            <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>Company name *</div>
            <input style={inputStyle} value={form.company} onChange={upF("company")} placeholder="Company name"/>
          </div>
          <div>
            <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>Tier</div>
            <select style={inputStyle} value={form.tier} onChange={upF("tier")}>
              <option value="Priority">Priority</option>
              <option value="Developing">Developing</option>
              <option value="Long Game">Long Game</option>
            </select>
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:6}}>
        <button onClick={save} style={{flex:2,background:"#22c55e",border:"none",borderRadius:6,padding:"7px",fontSize:12,fontWeight:700,color:"#0a0d13",cursor:"pointer"}}>
          Save Contact & Log
        </button>
        <button onClick={function(){setDecision(item.id,{_addingNew:false});}} style={{flex:1,background:"transparent",border:"1px solid #2a2f35",borderRadius:6,padding:"7px",fontSize:12,color:"#9ca3af",cursor:"pointer"}}>
          Cancel
        </button>
      </div>
    </div>
  );
};

function OutlookSyncModal({ data, upd, closeModal, demoMode }) {
  if(demoMode) return (
    <div style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:36,marginBottom:12}}>🔒</div>
      <div style={{fontWeight:700,fontSize:15,color:"#f1f0f4",marginBottom:8}}>Not available in Demo Mode</div>
      <div style={{fontSize:13,color:"#6b7280"}}>Outlook Sync requires a real SalesOS account connected to your Microsoft 365.</div>
    </div>
  );
  const [status,     setStatus]     = React.useState("idle"); // idle | loading | loaded | error
  const [connected,  setConnected]  = React.useState(null);   // null | true | false
  const [items,      setItems]      = React.useState([]);      // all fetched items
  const [decisions,  setDecisions]  = React.useState({});     // id -> { action, contactId, accId, jobId, type }
  const [processedIds, setProcessedIds] = React.useState(new Set()); // IDs already dealt with
  const [saved,      setSaved]      = React.useState(false);
  const [tab,        setTab]        = React.useState("all");   // all | email_sent | email_received | calendar

  const SYNC_URL = "/.netlify/functions/outlook-sync";
  const AUTH_URL = "/.netlify/functions/outlook-auth";

  // Check connection status on open
  React.useEffect(function() {
    checkConnection();
    // Also check if we just came back from OAuth
    const params = new URLSearchParams(window.location.search);
    if (params.get("outlook") === "connected") {
      window.history.replaceState({}, "", window.location.pathname);
      checkConnection();
    }
  }, []);

  async function checkConnection() {
    setStatus("loading");
    try {
      // Load previously processed IDs from Supabase
      const pidRes = await fetch("/.netlify/functions/outlook-sync?getProcessed=1");
      if (pidRes.ok) {
        try {
          const pidData = await pidRes.json();
          if (pidData.processedIds && Array.isArray(pidData.processedIds)) {
            setProcessedIds(new Set(pidData.processedIds));
          }
        } catch(e) {}
      }
      const res = await fetch(SYNC_URL);
      if (res.status === 401) {
        setConnected(false);
        setStatus("idle");
        return;
      }
      const d = await res.json();
      if (d.error === "not_connected") {
        setConnected(false);
        setStatus("idle");
        return;
      }
      setConnected(true);
      processItems(d);
      setStatus("loaded");
    } catch (e) {
      setConnected(false);
      setStatus("idle");
    }
  }

  function processItems(d) {
    const rawAll = [];
    // Sent emails
    (d.emails || []).forEach(function(e) {
      rawAll.push({ ...e, _type: "email_sent",      _label: "Sent Email",     _color: "#60a5fa" });
    });
    // Received emails
    (d.received || []).forEach(function(e) {
      rawAll.push({ ...e, _type: "email_received",  _label: "Received Email", _color: "#7a5fc0" });
    });
    // Calendar events
    (d.events || []).forEach(function(e) {
      rawAll.push({ ...e, _type: "calendar",         _label: "Calendar Event", _color: "#c8980a" });
    });
    // Filter out already-processed items
    const fresh = rawAll.filter(function(item) { return !processedIds.has(item.id); });

    // Also filter out items already logged as activities (by date+subject match)
    const reallyFresh = fresh.filter(function(item) {
      var alreadyLogged = false;
      data.accounts.forEach(function(acc) {
        acc.contacts.forEach(function(con) {
          (con.activities||[]).forEach(function(act) {
            if(act.fromOutlook && act.date === item.date && act.notes && item.subject && act.notes.includes(item.subject.slice(0,30))) {
              alreadyLogged = true;
            }
          });
        });
      });
      return !alreadyLogged;
    });

    // Sort by date desc
    reallyFresh.sort(function(a, b) { return (b.date || "").localeCompare(a.date || ""); });

    // Auto-match each item to existing contacts by email address
    const withMatches = reallyFresh.map(function(item) {
      const emails = [];
      if (item._type === "email_sent") {
        (item.to || []).forEach(function(r) { if (r.email) emails.push(r.email.toLowerCase()); });
      } else if (item._type === "email_received") {
        if (item.from && item.from.email) emails.push(item.from.email.toLowerCase());
      } else if (item._type === "calendar") {
        (item.attendees || []).forEach(function(a) { if (a.email) emails.push(a.email.toLowerCase()); });
      }

      // Try to find a matching contact in SalesOS
      let matchedCon = null, matchedAcc = null;
      data.accounts.forEach(function(acc) {
        acc.contacts.forEach(function(con) {
          if (con.email && emails.includes(con.email.toLowerCase())) {
            matchedCon = con;
            matchedAcc = acc;
          }
        });
      });

      return { ...item, _matchedCon: matchedCon, _matchedAcc: matchedAcc, _emails: emails };
    });

    setItems(withMatches);

    // Auto-set decisions for matched items
    const autoDecs = {};
    withMatches.forEach(function(item) {
      if (item._matchedCon) {
        autoDecs[item.id] = {
          action: "log",
          contactId: item._matchedCon.id,
          accId:     item._matchedAcc.id,
          type:      item._type === "calendar" ? guessCalendarType(item.subject) : "Email"
        };
      }
    });
    setDecisions(autoDecs);
  }

  function guessCalendarType(subject) {
    if (!subject) return "Other";
    const s = subject.toLowerCase();
    if (/lunch|dinner|breakfast/.test(s))     return "Lunch";
    if (/coffee|cafe|café/.test(s))           return "Coffee";
    if (/happy hour|drinks|bar/.test(s))      return "Happy Hour";
    if (/site|walk|field/.test(s))            return "Site Visit";
    if (/call|phone/.test(s))                 return "Phone Call";
    if (/proposal|bid|present/.test(s))       return "Proposal";
    if (/event|conference|mixer|show/.test(s))return "Market Event";
    return "Other";
  }

  function setDecision(id, changes) {
    setDecisions(function(d) {
      return Object.assign({}, d, { [id]: Object.assign({}, d[id] || {}, changes) });
    });
  }

  function save() {
    upd(function(d) {
      items.forEach(function(item) {
        var dec = decisions[item.id];
        // Handle general log
        if (dec && dec.action === "genLog") {
          if (!d.generalActivities) d.generalActivities = [];
          d.generalActivities.unshift({
            id: Math.random().toString(36).slice(2,9),
            type: item._type === "calendar" ? "Market Event" : "Email",
            date: item.date || new Date().toISOString().slice(0,10),
            notes: (item.subject||"No subject") + (item.preview ? " — " + item.preview.slice(0,100) : ""),
            createdAt: new Date().toISOString()
          });
          return;
        }
        if (!dec || dec.action !== "log" || !dec.contactId) return;
        var acc = d.accounts.find(function(a) { return a.id === dec.accId; });
        if (!acc) return;
        var con = acc.contacts.find(function(c) { return c.id === dec.contactId; });
        if (!con) return;

        // Build notes from subject + preview
        var notes = item.subject || "";
        if (item.preview && item.preview.trim()) notes += (notes ? " — " : "") + item.preview.trim();

        // Avoid logging the exact same date+type combo twice
        var isDupe = con.activities.some(function(a) {
          return a.date === item.date && a.type === dec.type && a.notes && a.notes.includes(item.subject || "");
        });
        if (isDupe) return;

        con.activities.unshift({
          id:       Math.random().toString(36).slice(2, 9),
          type:     dec.type || "Email",
          date:     item.date || new Date().toISOString().slice(0, 10),
          notes:    notes.slice(0, 500),
          followUp: null,
          jobId:    dec.jobId || null,
          fromOutlook: true
        });
      });
      return d;
    });
    setSaved(true);

    // Save all processed IDs (logged, skipped, genLogged) to Supabase
    const newProcessed = items.map(function(item) { return item.id; }).filter(Boolean);
    if (newProcessed.length > 0) {
      const allProcessed = [...processedIds, ...newProcessed];
      fetch("/.netlify/functions/outlook-sync", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({saveProcessed: true, processedIds: allProcessed})
      }).catch(function(){});
    }
  }

  const filtered = tab === "all" ? items : items.filter(function(i) { return i._type === tab; });
  const matched  = items.filter(function(i) { return !!i._matchedCon; }).length;
  const toLog    = Object.values(decisions).filter(function(d) { return d.action === "log" && d.contactId; }).length;

  if (saved) {
    return (
      <div style={{ textAlign: "center", padding: "40px 20px" }}>
        <div style={{ fontSize: 36, marginBottom: 12 }}>✓</div>
        <div style={{ fontFamily: "Georgia,serif", fontSize: 18, color: "#f1f0f4", marginBottom: 8 }}>
          {toLog} activities logged from Outlook
        </div>
        <button onClick={closeModal} style={{ padding: "8px 24px", background: "#c8980a", border: "none", borderRadius: 8, color: "#0a0d13", fontWeight: 700, cursor: "pointer", fontSize: 14 }}>
          Done
        </button>
      </div>
    );
  }

  // Not connected yet
  if (connected === false) {
    return (
      <div style={{ textAlign: "center", padding: "40px 20px" }}>
        <div style={{ fontSize: 40, marginBottom: 16 }}>📧</div>
        <div style={{ fontFamily: "Georgia,serif", fontSize: 20, color: "#f1f0f4", marginBottom: 10 }}>
          Connect Your Outlook
        </div>
        <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 28, lineHeight: 1.7, maxWidth: 380, margin: "0 auto 28px" }}>
          Sign in with your Fairco Microsoft account to pull recent emails and calendar events into SalesOS and log them as activities.
        </div>
        <a href={AUTH_URL}
          style={{ display: "inline-block", padding: "11px 28px", background: "#0078d4", color: "#fff", borderRadius: 8, fontWeight: 700, fontSize: 14, textDecoration: "none" }}>
          Sign in with Microsoft
        </a>
        <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 14 }}>
          Only reads your Fairco account. Never writes to Outlook.
        </div>
      </div>
    );
  }

  // Loading
  if (status === "loading") {
    return (
      <div style={{ textAlign: "center", padding: "60px 20px", color: "#6b7280", fontSize: 13 }}>
        <div style={{ width: 24, height: 24, border: "2px solid #c8980a", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite", margin: "0 auto 16px" }} />
        Pulling from Outlook...
      </div>
    );
  }

  return (
    <div>
      {/* Summary bar */}
      <div style={{ background: "#1a1f24", borderRadius: 10, padding: "12px 16px", marginBottom: 16, display: "flex", gap: 24, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ color: "#60a5fa", fontWeight: 700, fontSize: 22 }}>{items.length}</div>
          <div style={{ color: "#9ca3af", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.07em" }}>Items Pulled</div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div style={{ color: "#22c55e", fontWeight: 700, fontSize: 22 }}>{matched}</div>
          <div style={{ color: "#9ca3af", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.07em" }}>Auto-Matched</div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div style={{ color: "#c8980a", fontWeight: 700, fontSize: 22 }}>{toLog}</div>
          <div style={{ color: "#9ca3af", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.07em" }}>Ready to Log</div>
        </div>
        <button onClick={checkConnection} style={{ marginLeft: "auto", padding: "5px 14px", background: "transparent", border: "1px solid #2a2f35", borderRadius: 8, cursor: "pointer", fontSize: 12, color: "#9ca3af" }}>
          ↻ Refresh
        </button>
      </div>

      {/* Bulk actions */}
      {items.length > 0 && (
        <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
          <button
            onClick={function() {
              var bulk = {};
              items.forEach(function(item) {
                if (item._matchedCon && item._matchedAcc) {
                  bulk[item.id] = {
                    action: "log",
                    contactId: item._matchedCon.id,
                    accId: item._matchedAcc.id,
                    type: item._type === "calendar" ? guessCalendarType(item.subject) : "Email"
                  };
                }
              });
              setDecisions(function(d) { return Object.assign({}, d, bulk); });
            }}
            style={{ padding: "6px 14px", background: "#22c55e22", border: "1px solid #22c55e40", borderRadius: 8, cursor: "pointer", fontSize: 12, fontWeight: 700, color: "#22c55e" }}>
            ✓ Log All Matched ({matched})
          </button>
          <button
            onClick={function() {
              var bulk = {};
              items.forEach(function(item) {
                if (!item._matchedCon) bulk[item.id] = { action: "skip" };
              });
              setDecisions(function(d) { return Object.assign({}, d, bulk); });
            }}
            style={{ padding: "6px 14px", background: "#6b728022", border: "1px solid #6b728040", borderRadius: 8, cursor: "pointer", fontSize: 12, fontWeight: 700, color: "#9ca3af" }}>
            Skip All Unmatched ({items.filter(function(i){return !i._matchedCon;}).length})
          </button>
          <button
            onClick={function() {
              var bulk = {};
              items.forEach(function(item) {
                if (!decisions[item.id] || !decisions[item.id].action) bulk[item.id] = { action: "skip" };
              });
              setDecisions(function(d) { return Object.assign({}, d, bulk); });
            }}
            style={{ padding: "6px 14px", background: "#ef444422", border: "1px solid #ef444440", borderRadius: 8, cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#ef4444" }}>
            Skip All Undecided
          </button>
        </div>
      )}

      {/* Tab filter */}
      <div style={{ display: "flex", borderBottom: "1px solid #2a2f35", marginBottom: 16 }}>
        {[["all","All"],["email_sent","Sent"],["email_received","Received"],["calendar","Calendar"]].map(function(pair) {
          var active = tab === pair[0];
          return (
            <button key={pair[0]} onClick={function() { setTab(pair[0]); }}
              style={{ padding: "7px 16px", fontSize: 13, fontWeight: active ? 700 : 400, color: active ? "#c8980a" : "#7a7880", background: "none", border: "none", borderBottom: "2px solid " + (active ? "#c8980a" : "transparent"), cursor: "pointer", fontFamily: "inherit", color: "#f1f0f4" }}>
              {pair[1]}
            </button>
          );
        })}
      </div>

      {/* Items list */}
      <div style={{ maxHeight: 420, overflowY: "auto", paddingRight: 4 }}>
        {filtered.length === 0 && (
          <div style={{ color: "#9ca3af", textAlign: "center", padding: "32px 0", fontSize: 13 }}>No items in this category.</div>
        )}
        {filtered.map(function(item) {
          var dec = decisions[item.id] || {};
          var isLogging = dec.action === "log" && dec.contactId;
          var borderColor = isLogging ? "#22c55e60" : dec.action === "skip" ? "#aaa8b030" : "#e0dde0";

          // People list for display
          var people = [];
          if (item._type === "email_sent")      people = (item.to || []);
          if (item._type === "email_received")  people = item.from ? [item.from] : [];
          if (item._type === "calendar")        people = (item.attendees || []).filter(function(a) { return a.email && !a.email.toLowerCase().includes("west@fairco"); });

          return (
            <div key={item.id} style={{ border: "1px solid " + borderColor, borderRadius: 10, padding: "12px 14px", marginBottom: 10, background: dec.action === "skip" ? "#fafafa" : "#fff", opacity: dec.action === "skip" ? 0.5 : 1 }}>
              {/* Header row */}
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 8 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3, flexWrap: "wrap" }}>
                    <span style={{ background: item._color + "22", color: item._color, border: "1px solid " + item._color + "50", borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 600 }}>
                      {item._label}
                    </span>
                    <span style={{ fontSize: 11, color: "#9ca3af" }}>{item.date}</span>
                  </div>
                  <div style={{ fontWeight: 700, color: "#f1f0f4", fontSize: 14, marginBottom: 2 }}>{item.subject || "(no subject)"}</div>
                  {people.length > 0 && (
                    <div style={{ fontSize: 12, color: "#6b7280" }}>
                      {item._type === "email_sent" ? "To: " : item._type === "email_received" ? "From: " : "With: "}
                      {people.slice(0, 3).map(function(p) { return p.name || p.email; }).join(", ")}
                      {people.length > 3 ? " +" + (people.length - 3) + " more" : ""}
                    </div>
                  )}
                  {item.preview && <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 4, lineHeight: 1.4 }}>{item.preview.slice(0, 120)}{item.preview.length > 120 ? "..." : ""}</div>}
                </div>
                {/* Action buttons */}
                <div style={{ display: "flex", gap: 6, marginLeft: 12, flexShrink: 0 }}>
                  <button onClick={function() { setDecision(item.id, { action: dec.action === "log" ? null : "log", contactId: dec.contactId || (item._matchedCon ? item._matchedCon.id : null), accId: dec.accId || (item._matchedAcc ? item._matchedAcc.id : null), type: dec.type || (item._type === "calendar" ? guessCalendarType(item.subject) : "Email") }); }}
                    style={{ padding: "3px 10px", fontSize: 11, borderRadius: 6, cursor: "pointer", border: "1px solid " + (isLogging ? "#22c55e80" : "#e0dde0"), background: isLogging ? "#22c55e22" : "transparent", color: isLogging ? "#16a34a" : "#6b7280", fontWeight: isLogging ? 700 : 400 }}>
                    {isLogging ? "✓ Log" : "+ Log"}
                  </button>
                  <button onClick={function() { setDecision(item.id, { action: dec.action === "skip" ? null : "skip" }); }}
                    style={{ padding: "3px 10px", fontSize: 11, borderRadius: 6, cursor: "pointer", border: "1px solid " + (dec.action === "skip" ? "#aaa8b080" : "#2a2f35"), background: dec.action === "skip" ? "#aaa8b022" : "transparent", color: "#9ca3af" }}>
                    Skip
                  </button>
                  <button onClick={function() { setDecision(item.id, { action: dec.action === "genLog" ? null : "genLog" }); }}
                    style={{ padding: "3px 10px", fontSize: 11, borderRadius: 6, cursor: "pointer", border: "1px solid " + (dec.action === "genLog" ? "#7c3aed80" : "#2a2f35"), background: dec.action === "genLog" ? "#7c3aed22" : "transparent", color: dec.action === "genLog" ? "#a78bfa" : "#9ca3af", fontWeight: dec.action === "genLog" ? 700 : 400 }}>
                    {dec.action === "genLog" ? "✓ General Log" : "General Log"}
                  </button>
                </div>
              </div>

              {/* Match / assign row */}
              {dec.action === "log" && (
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", paddingTop: 8, borderTop: "1px solid #f0eff0" }}>
                  {/* Auto-matched badge */}
                  {item._matchedCon && !dec._manualOverride && (
                    <span style={{ fontSize: 11, color: "#16a34a", background: "#14532d22", border: "1px solid #86efac", borderRadius: 6, padding: "2px 8px" }}>
                      ✓ {item._matchedCon.name} @ {item._matchedAcc && item._matchedAcc.name}
                    </span>
                  )}
                  {/* Contact picker */}
                  <select
                    value={dec.contactId || ""}
                    onChange={function(e) {
                      var found = data.accounts.flatMap(function(a) { return a.contacts.map(function(c) { return { con: c, acc: a }; }); }).find(function(x) { return x.con.id === e.target.value; });
                      setDecision(item.id, { contactId: e.target.value, accId: found ? found.acc.id : null, _manualOverride: true });
                    }}
                    style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid #2a2f35", fontSize: 12, background: "#1e2530", fontFamily: "inherit", color: "#f1f0f4" }}>
                    <option value="">{item._matchedCon && !dec._manualOverride ? "Change contact..." : "-- Assign to contact --"}</option>
                    {data.accounts.flatMap(function(acc) {
                      return acc.contacts.map(function(con) { return { con: con, acc: acc }; });
                    }).sort(function(a, b) { return a.con.name.localeCompare(b.con.name); }).map(function(x) {
                      return <option key={x.con.id} value={x.con.id}>{x.con.name} — {x.acc.name}</option>;
                    })}
                  </select>
                  {/* Add to SalesOS button for unmatched */}
                  {!item._matchedCon && !dec._manualOverride && (
                    <button
                      onClick={function() { setDecision(item.id, { _addingNew: true }); }}
                      style={{ padding: "4px 10px", fontSize: 11, borderRadius: 6, cursor: "pointer", border: "1px solid #22c55e80", background: "#22c55e22", color: "#16a34a", fontWeight: 600, whiteSpace: "nowrap" }}>
                      + Add to SalesOS
                    </button>
                  )}
                  {/* New contact form */}
                  {dec._addingNew && <AddToSalesOSForm item={item} dec={dec} setDecision={setDecision} data={data} upd={upd} />}
                  {/* Activity type picker */}
                  <select
                    value={dec.type || "Email"}
                    onChange={function(e) { setDecision(item.id, { type: e.target.value }); }}
                    style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid #2a2f35", fontSize: 12, background: "#1e2530", fontFamily: "inherit", color: "#f1f0f4" }}>
                    {["Email","Phone Call","Coffee","Lunch","Happy Hour","Site Visit","Market Event","Proposal","LinkedIn Message","Other"].map(function(t) {
                      return <option key={t} value={t}>{t}</option>;
                    })}
                  </select>
                  {/* Optional job link */}
                  {dec.accId && (function() {
                    var acc = data.accounts.find(function(a) { return a.id === dec.accId; });
                    var jobs = acc ? acc.jobs : [];
                    if (jobs.length === 0) return null;
                    return (
                      <select value={dec.jobId || ""} onChange={function(e) { setDecision(item.id, { jobId: e.target.value || null }); }}
                        style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid #2a2f35", fontSize: 12, background: "#1e2530", fontFamily: "inherit", color: "#f1f0f4" }}>
                        <option value="">No job linked</option>
                        {jobs.map(function(j) { return <option key={j.id} value={j.id}>{j.name}</option>; })}
                      </select>
                    );
                  })()}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Footer */}
      <div style={{ display: "flex", gap: 10, marginTop: 18, alignItems: "center" }}>
        <button onClick={closeModal} style={{ padding: "8px 18px", background: "transparent", border: "1px solid #d0cdd0", borderRadius: 8, cursor: "pointer", fontSize: 13, color: "#7a7880" }}>
          Cancel
        </button>
        <button
          onClick={save}
          disabled={toLog === 0}
          style={{ flex: 1, padding: "10px 18px", background: toLog > 0 ? "#c8980a" : "#e8e7e8", border: "none", borderRadius: 8, cursor: toLog > 0 ? "pointer" : "not-allowed", fontWeight: 700, fontSize: 14, color: toLog > 0 ? "#0a0d13" : "#9ca3af" }}>
          {toLog > 0 ? "Log " + toLog + " Activities from Outlook" : "Select items to log"}
        </button>
      </div>
    </div>
  );
}

function CampaignForm({contactId, data, upd, onClose}) {
  const allContacts = data.accounts.flatMap(a=>a.contacts.map(con=>({con,acc:a})));
  const initConId = contactId || (allContacts[0]&&allContacts[0].con.id) || "";
  const [conId, setConId] = React.useState(initConId);
  const [name, setName] = React.useState("Cold Outreach");
  const [touches, setTouches] = React.useState([
    {label:"First Contact", daysAfterPrev:0},
    {label:"Follow-up", daysAfterPrev:14},
    {label:"Check-in", daysAfterPrev:21},
    {label:"Touch 4", daysAfterPrev:21},
    {label:"Touch 5", daysAfterPrev:30},
    {label:"Touch 6", daysAfterPrev:30},
  ]);

  function addTouch() {
    setTouches(function(t){ return [...t, {label:"Touch "+(t.length+1), daysAfterPrev:21}]; });
  }
  function removeTouch(i) {
    setTouches(function(t){ return t.filter(function(_,idx){ return idx!==i; }); });
  }
  function updateTouch(i, key, val) {
    setTouches(function(t){ var n=t.slice(); n[i]=Object.assign({},n[i],{[key]:val}); return n; });
  }

  function save() {
    if(!conId||!name.trim()||touches.length<1) return;
    var today = new Date().toISOString().slice(0,10);
    // Calculate first due date (touch 1 starts today)
    var campaignTouches = touches.map(function(t, i) {
      return {label:t.label, daysAfterPrev:parseInt(t.daysAfterPrev)||0, completedAt:null, activityType:null, dueDate:i===0?today:null};
    });
    upd(function(d) {
      d.accounts.forEach(function(acc) {
        var con = acc.contacts.find(function(c){ return c.id===conId; });
        if(con) {
          con.campaign = {id:uid(), name:name.trim(), status:"active", createdAt:today, touches:campaignTouches};
        }
      });
      return d;
    });
    onClose();
  }

  var chosenCon = allContacts.find(function(x){ return x.con.id===conId; });
  var hasActiveCampaign = chosenCon && chosenCon.con.campaign && chosenCon.con.campaign.status==="active";

  return (
    <div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>Contact</div>
        <select value={conId} onChange={function(e){setConId(e.target.value);}} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #e5e7eb",fontFamily:"inherit",fontSize:14,background:"#fff"}}>
          {allContacts.sort(function(a,b){return a.con.name.localeCompare(b.con.name);}).map(function(x){
            return <option key={x.con.id} value={x.con.id}>{x.con.name} — {x.acc.name}</option>;
          })}
        </select>
        {hasActiveCampaign && <div style={{fontSize:12,color:"#ef4444",marginTop:6}}>⚠ This contact already has an active campaign. Starting a new one will replace it.</div>}
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>Campaign Name</div>
        <input value={name} onChange={function(e){setName(e.target.value);}} placeholder="e.g. Cold Outreach, Re-engagement" style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #e5e7eb",fontFamily:"inherit",fontSize:14,boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontSize:11,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.06em"}}>Touches ({touches.length})</div>
          <button onClick={addTouch} style={{padding:"3px 12px",background:"transparent",border:"1px solid #e5e7eb",borderRadius:6,cursor:"pointer",fontSize:12,color:"#6b7280"}}>+ Add Touch</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>

const DraftMessageModal = ({item, data, upd, onClose, demoMode}) => {
  const {con, acc, camp, touch, diff} = item;
  const [templateKey, setTemplateKey] = React.useState(Object.keys(CAMPAIGN_TEMPLATES)[0]);
  const [draft, setDraft] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [copied, setCopied] = React.useState(false);
  const [error, setError] = React.useState("");

  // Gather context about this contact
  const recentActivities = (con.activities||[]).slice(0,3).map(a=>`${a.date} - ${a.type}: ${a.notes}`).join("\n");
  const jobs = (acc.jobs||[]).filter(j=>j.status==="active"||j.status==="bidding").map(j=>`${j.name} (${j.status})`).join(", ");

  const generateDraft = async () => {
    if(demoMode) { setError("Draft generation is not available in demo mode."); return; }
    setLoading(true);
    setError("");
    setDraft("");
    const template = CAMPAIGN_TEMPLATES[templateKey];
    const prompt = `You are drafting a sales outreach message for West Tunnell, Business Development at Fairco Inc., a commercial landscape infrastructure company in Arizona.

West's writing style: conversational but professional, gets to the point fast, uses industry language ("get in the dirt", "in the pipeline", "bid list"), short sentences, no corporate fluff, signs off as just "West", never burns bridges, always ends with a soft open door.

TEMPLATE TO USE AS FOUNDATION:
${template.template}

PERSONALIZE THIS FOR:
- Contact: ${con.name}${con.title?", "+con.title:""}
- Company: ${acc.name}${acc.tier?" ("+acc.tier+")":""}
- Notes on contact: ${con.notes||"None"}
- Active jobs/bids: ${jobs||"None listed"}
- Recent activity: ${recentActivities||"No prior contact logged"}
- Campaign touch: ${touch.label}
- Days until due: ${diff===0?"Today":diff===1?"Tomorrow":diff<0?Math.abs(diff)+" days overdue":diff+" days"}

INSTRUCTIONS:
- Use the template as the base but personalize it with the contact's specific details
- Replace [First Name] with ${con.name.split(" ")[0]}
- Replace [Company] with ${acc.name}
- If there are active jobs, reference them naturally where relevant
- Keep West's voice — casual, direct, genuine
- Do NOT add fluff or make it sound like an AI wrote it
- Return ONLY the message text, no preamble or explanation`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{role:"user", content: prompt}]
        })
      });
      const json = await res.json();
      const text = json.content&&json.content[0]&&json.content[0].text;
      if(text) setDraft(text);
      else setError("No response from Claude. Try again.");
    } catch(e) {
      setError("Error generating draft: "+e.message);
    }
    setLoading(false);
  };

  const markSent = () => {
    upd(d => {
      const a = d.accounts.find(x=>x.id===acc.id);
      if(!a) return d;
      const c = a.contacts.find(x=>x.id===con.id);
      if(!c||!c.campaign) return d;
      const t = c.campaign.touches.find(x=>x.label===touch.label&&!x.completedAt);
      if(t) t.completedAt = new Date().toISOString().slice(0,10);
      if(!c.activities) c.activities=[];
      c.activities.unshift({
        id: Date.now().toString(),
        type: templateKey.includes("LinkedIn")?"LinkedIn Message":"Email",
        date: new Date().toISOString().slice(0,10),
        notes: `Campaign touch: ${touch.label}. ${draft.slice(0,120)}...`,
        followUp: null,
        createdAt: new Date().toISOString()
      });
      a.lastContact = new Date().toISOString().slice(0,10);
      return d;
    });
    onClose();
  };

  const copy = () => {
    navigator.clipboard.writeText(draft).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#13181a",border:"1px solid #2a2f35",borderRadius:14,padding:20,width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:"#f1f0f4"}}>✍ Draft Message</div>
            <div style={{fontSize:12,color:"#6b7280"}}>{con.name} @ {acc.name} · {touch.label}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:20}}>✕</button>
        </div>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:600,color:"#9ca3af",marginBottom:6}}>Select Template</div>
          <select
            value={templateKey}
            onChange={e=>setTemplateKey(e.target.value)}
            style={{width:"100%",background:"#1e2530",border:"1px solid #2a2f35",borderRadius:8,padding:"8px 12px",color:"#f1f0f4",fontSize:13}}
          >
            {Object.entries(CAMPAIGN_TEMPLATES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>

        <button
          onClick={generateDraft}
          disabled={loading}
          style={{width:"100%",background:"#7c3aed",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,color:"#fff",cursor:loading?"not-allowed":"pointer",marginBottom:12,opacity:loading?0.7:1}}
        >
          {loading?"⏳ Generating...":"✨ Generate Draft with Claude"}
        </button>

        {error && <div style={{color:"#ef4444",fontSize:12,marginBottom:10}}>{error}</div>}

        {draft && (
          <>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:12,fontWeight:600,color:"#9ca3af",marginBottom:6}}>Draft — edit before sending</div>
              <textarea
                value={draft}
                onChange={e=>setDraft(e.target.value)}
                style={{width:"100%",minHeight:200,background:"#1e2530",border:"1px solid #2a2f35",borderRadius:8,padding:"10px 12px",color:"#f1f0f4",fontSize:13,lineHeight:1.5,resize:"vertical",boxSizing:"border-box"}}
              />
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={copy} style={{flex:1,background:"#1e2530",border:"1px solid #2a2f35",borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,color:copied?"#22c55e":"#f1f0f4",cursor:"pointer"}}>
                {copied?"✓ Copied!":"📋 Copy"}
              </button>
              <button onClick={markSent} style={{flex:2,background:"#22c55e",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,color:"#0a0d13",cursor:"pointer"}}>
                ✓ Mark Sent & Log Activity
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

const LinkedInImportModal = ({data, upd, onClose}) => {
  const [step, setStep] = React.useState("upload"); // upload | filtering | review | done
  const [rawContacts, setRawContacts] = React.useState([]);
  const [filtered, setFiltered] = React.useState([]);
  const [selected, setSelected] = React.useState({});
  const [progress, setProgress] = React.useState("");
  const [error, setError] = React.useState("");

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    setError("");
    const text = await file.text();
    // Parse CSV
    const lines = text.split("\n").filter(l=>l.trim());
    if(lines.length < 2) { setError("CSV appears empty"); return; }
    const headers = lines[0].split(",").map(h=>h.replace(/"/g,"").trim().toLowerCase());
    const firstNameIdx = headers.findIndex(h=>h.includes("first"));
    const lastNameIdx = headers.findIndex(h=>h.includes("last"));
    const companyIdx = headers.findIndex(h=>h.includes("company")||h.includes("organization"));
    const positionIdx = headers.findIndex(h=>h.includes("position")||h.includes("title")||h.includes("job"));
    const emailIdx = headers.findIndex(h=>h.includes("email"));
    const dateIdx = headers.findIndex(h=>h.includes("connected")||h.includes("date"));

    const contacts = lines.slice(1).map(line=>{
      const cols = line.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g)||line.split(",");
      const clean = cols.map(c=>(c||"").replace(/^"|"$/g,"").trim());
      return {
        firstName: firstNameIdx>=0?clean[firstNameIdx]:"",
        lastName: lastNameIdx>=0?clean[lastNameIdx]:"",
        company: companyIdx>=0?clean[companyIdx]:"",
        position: positionIdx>=0?clean[positionIdx]:"",
        email: emailIdx>=0?clean[emailIdx]:"",
        connectedOn: dateIdx>=0?clean[dateIdx]:""
      };
    }).filter(c=>c.firstName||c.company);

    setRawContacts(contacts);
    filterWithClaude(contacts);
  };

  const filterWithClaude = async (contacts) => {
    setStep("filtering");
    setProgress("Analyzing "+contacts.length+" contacts...");

    // Process in batches of 50
    const batchSize = 50;
    const allFiltered = [];

    for(let i=0; i<contacts.length; i+=batchSize) {
      const batch = contacts.slice(i, i+batchSize);
      setProgress(`Analyzing contacts ${i+1}–${Math.min(i+batchSize, contacts.length)} of ${contacts.length}...`);

      const prompt = `You are filtering a LinkedIn connections list for West Tunnell, BD at Fairco Inc. — a commercial landscape infrastructure company doing large-scale projects in Arizona, California, and Nevada. Target prospects are: GCs (general contractors), real estate developers, project owners, land developers, civil engineers at development firms, construction managers, estimators at GC/developer firms.

NOT relevant: recruiters, HR, marketing, software/tech, finance/banking, retail, healthcare, random personal contacts, people with no company listed.

For each contact below, respond with ONLY a JSON array. Each item: {"idx": number, "relevant": true/false, "reason": "brief reason", "suggestedTier": "Priority"|"Developing"|"Long Game"|null}

Contacts (index, name, company, position):
${batch.map((c,j)=>`${i+j}. ${c.firstName} ${c.lastName} | ${c.company} | ${c.position}`).join("\n")}

Return ONLY the JSON array, no other text.`;

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            model:"claude-sonnet-4-20250514",
            max_tokens:2000,
            messages:[{role:"user",content:prompt}]
          })
        });
        const json = await res.json();
        const text = json.content&&json.content[0]&&json.content[0].text||"[]";
        const clean = text.replace(/```json|```/g,"").trim();
        const results = JSON.parse(clean);
        results.forEach(r=>{
          if(r.relevant) {
            const c = contacts[r.idx];
            allFiltered.push({...c, reason:r.reason, suggestedTier:r.suggestedTier, originalIdx:r.idx});
          }
        });
      } catch(e) {
        console.error("Batch error:", e);
      }
    }

    setFiltered(allFiltered);
    const initSel = {};
    allFiltered.forEach((c,i)=>{ initSel[i]=true; });
    setSelected(initSel);
    setStep("review");
  };

  const importSelected = () => {
    const toImport = filtered.filter((_,i)=>selected[i]);
    upd(d => {
      toImport.forEach(c => {
        const fullName = (c.firstName+" "+c.lastName).trim();
        const companyName = c.company||"Unknown";
        // Find or create account
        let acc = d.accounts.find(a=>a.name.toLowerCase()===companyName.toLowerCase());
        if(!acc) {
          acc = {
            id: "acc_li_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
            name: companyName,
            tier: c.suggestedTier||"Long Game",
            contacts:[],
            jobs:[],
            notes:"",
            lastContact:null,
            market:[]
          };
          d.accounts.push(acc);
        }
        // Add contact if not duplicate
        const exists = acc.contacts.find(x=>x.name.toLowerCase()===fullName.toLowerCase());
        if(!exists && fullName.trim()) {
          acc.contacts.push({
            id: "con_li_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
            name: fullName,
            title: c.position||"",
            email: c.email||"",
            phone:"",
            notes:"Imported from LinkedIn"+( c.connectedOn?" — connected "+c.connectedOn:""),
            activities:[],
            campaign:null
          });
        }
      });
      return d;
    });
    setStep("done");
  };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#13181a",border:"1px solid #2a2f35",borderRadius:14,padding:20,width:"100%",maxWidth:580,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:15,color:"#f1f0f4"}}>💼 LinkedIn Smart Import</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:20}}>✕</button>
        </div>

        {step==="upload" && (
          <div>
            <div style={{fontSize:13,color:"#9ca3af",marginBottom:16,lineHeight:1.6}}>
              Export your LinkedIn connections as a CSV, then upload it here. Claude will scan every contact and filter down to GCs, developers, and owners relevant to Fairco BD.
              <br/><br/>
              <strong style={{color:"#f1f0f4"}}>How to export:</strong> LinkedIn → Me → Settings & Privacy → Data Privacy → Get a copy of your data → Connections → Request archive (arrives by email in ~10 min)
            </div>
            {error && <div style={{color:"#ef4444",fontSize:12,marginBottom:10}}>{error}</div>}
            <label style={{display:"block",border:"2px dashed #2a2f35",borderRadius:10,padding:"30px",textAlign:"center",cursor:"pointer",color:"#6b7280",fontSize:13}}>
              <div style={{fontSize:24,marginBottom:8}}>📁</div>
              Click to upload LinkedIn connections CSV
              <input type="file" accept=".csv" onChange={handleFile} style={{display:"none"}}/>
            </label>
          </div>
        )}

        {step==="filtering" && (
          <div style={{textAlign:"center",padding:"40px 0"}}>
            <div style={{fontSize:28,marginBottom:12}}>⏳</div>
            <div style={{fontWeight:600,color:"#f1f0f4",marginBottom:8}}>Analyzing with Claude...</div>
            <div style={{fontSize:13,color:"#6b7280"}}>{progress}</div>
          </div>
        )}

        {step==="review" && (
          <div>
            <div style={{marginBottom:12,fontSize:13,color:"#9ca3af"}}>
              Found <strong style={{color:"#f1f0f4"}}>{filtered.length} relevant contacts</strong> out of {rawContacts.length} total. Uncheck anyone you want to skip.
            </div>
            <div style={{maxHeight:350,overflowY:"auto",marginBottom:12}}>
              {filtered.map((c,i)=>(
                <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 0",borderBottom:"1px solid #1e2530"}}>
                  <input type="checkbox" checked={!!selected[i]} onChange={e=>setSelected(p=>({...p,[i]:e.target.checked}))} style={{marginTop:3,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,color:"#f1f0f4"}}>{c.firstName} {c.lastName} <span style={{fontWeight:400,color:"#6b7280"}}>@ {c.company}</span></div>
                    <div style={{fontSize:12,color:"#9ca3af"}}>{c.position}</div>
                    <div style={{fontSize:11,color:"#4b5563",marginTop:2}}>{c.reason} {c.suggestedTier&&<span style={{color:"#7c3aed"}}>→ {c.suggestedTier}</span>}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setSelected(Object.fromEntries(filtered.map((_,i)=>[i,false])))} style={{flex:1,background:"#1e2530",border:"1px solid #2a2f35",borderRadius:8,padding:"8px",fontSize:12,color:"#9ca3af",cursor:"pointer"}}>Deselect All</button>
              <button onClick={importSelected} style={{flex:2,background:"#22c55e",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,color:"#0a0d13",cursor:"pointer"}}>
                Import {Object.values(selected).filter(Boolean).length} Contacts
              </button>
            </div>
          </div>
        )}

        {step==="done" && (
          <div style={{textAlign:"center",padding:"30px 0"}}>
            <div style={{fontSize:36,marginBottom:12}}>✅</div>
            <div style={{fontWeight:700,fontSize:15,color:"#f1f0f4",marginBottom:8}}>Import Complete</div>
            <div style={{fontSize:13,color:"#6b7280",marginBottom:20}}>Contacts and accounts have been added to SalesOS.</div>
            <button onClick={onClose} style={{background:"#7c3aed",border:"none",borderRadius:8,padding:"10px 24px",fontSize:13,fontWeight:700,color:"#fff",cursor:"pointer"}}>Done</button>
          </div>
        )}
      </div>
    </div>
  );
};


function CampaignPanel({data, upd, setModal, setForm, setSA, setSC, setView, showCampaignForm, setShowCampaignForm, demoMode}) {
  const navTo2 = function(accId, conId) { setSA(accId); setSC(conId); setView("contact"); };
  const [draftModal, setDraftModal] = React.useState(null); // {con, acc, camp, touch, touchType}
  const [linkedInModal, setLinkedInModal] = React.useState(false);

  // Gather all active campaigns
  const campaigns = [];
  data.accounts.forEach(function(acc) {
    acc.contacts.forEach(function(con) {
      var camp = con.campaign;
      if(!camp||camp.status!=="active") return;
      var done = camp.touches.filter(function(t){return t.completedAt;}).length;
      var next = camp.touches.find(function(t){return !t.completedAt;});
      var diff = next&&next.dueDate ? Math.ceil((new Date(next.dueDate)-new Date())/86400000) : null;
      campaigns.push({acc,con,camp,done,next,diff});
    });
  });
  campaigns.sort(function(a,b){ return (a.diff===null?999:a.diff)-(b.diff===null?999:b.diff); });

  const overdue = campaigns.filter(c=>c.diff!==null&&c.diff<0).length;
  const dueSoon = campaigns.filter(c=>c.diff!==null&&c.diff>=0&&c.diff<=3).length;

  return (
    <div>
      {/* Summary bar */}
      {(overdue>0||dueSoon>0) && (
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {overdue>0&&<div style={{background:"#ef444420",border:"1px solid #ef444440",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:700,color:"#ef4444"}}>⚠ {overdue} Overdue</div>}
          {dueSoon>0&&<div style={{background:"#c8980a20",border:"1px solid #c8980a40",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:700,color:"#c8980a"}}>🔔 {dueSoon} Due Within 3 Days</div>}
        </div>
      )}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:13,color:"#6b7280"}}>{campaigns.length} active campaign{campaigns.length!==1?"s":""}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={function(){setShowCampaignForm("new"); setModal("startCampaign");}} style={{padding:"6px 16px",background:"#7c3aed",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,color:"#fff"}}>+ New Campaign</button>
        </div>
      </div>

      {campaigns.length===0 && (
        <div style={{textAlign:"center",color:"#6b7280",fontSize:13,padding:"40px 0"}}>
          No active campaigns. Start one from any contact page or click New Campaign above.
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {campaigns.map(function(item, i) {
          var isOverdueItem = item.diff!==null && item.diff<0;
          var isDueSoon = item.diff!==null && item.diff>=0 && item.diff<=3;
          var isComingUp = item.diff!==null && item.diff>3 && item.diff<=7;
          return (
            <div key={i} style={{background:"#13181a",border:"1px solid "+(isOverdueItem?"#ef444440":isDueSoon?"#c8980a40":isComingUp?"#7c3aed30":"#2a2f35"),borderRadius:10,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:"#f1f0f4",marginBottom:2}}>{item.con.name} <span style={{fontWeight:400,color:"#6b7280",fontSize:13}}>@ {item.acc.name}</span></div>
                  <div style={{fontSize:12,color:"#7c3aed"}}>{item.camp.name}</div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <button onClick={function(){navTo2(item.acc.id,item.con.id);}} style={{padding:"4px 12px",background:"transparent",border:"1px solid #2a2f35",borderRadius:6,cursor:"pointer",fontSize:12,color:"#9ca3af"}}>View Contact</button>
                  <button onClick={function(){upd(function(d){var con2=d.accounts.find(function(a){return a.id===item.acc.id;}).contacts.find(function(c){return c.id===item.con.id;});con2.campaign=null;return d;});}} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:12,padding:"4px 6px"}}>End</button>
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                {item.camp.touches.map(function(t, ti) {
                  var isDone = !!t.completedAt;
                  var isCurrent = ti===item.done;
                  return (
                    <div key={ti} title={t.label+(isDone?" ✓ "+t.completedAt:t.dueDate?" due "+t.dueDate:"")} style={{width:30,height:30,borderRadius:"50%",background:isDone?"#22c55e22":"transparent",border:"2px solid "+(isDone?"#22c55e":isCurrent?"#c8980a":"#2a2f35"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:isDone?"#22c55e":isCurrent?"#c8980a":"#4b5563"}}>
                      {isDone?"✓":ti+1}
                    </div>
                  );
                })}
              </div>
              {item.next && (
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div style={{fontSize:13,color:isOverdueItem?"#ef4444":isDueSoon?"#c8980a":isComingUp?"#a78bfa":"#9ca3af"}}>
                    {isOverdueItem?"⚠ Overdue — ":isDueSoon?"🔔 Due soon — ":isComingUp?"📅 Coming up — ":"Next: "}
                    <strong style={{color:isOverdueItem?"#ef4444":isDueSoon?"#c8980a":isComingUp?"#a78bfa":"#d1d5db"}}>{item.next.label}</strong>
                    {item.next.dueDate&&" · "+(item.diff===0?"Today":item.diff===1?"Tomorrow":item.diff<0?Math.abs(item.diff)+" days overdue":item.diff+" days")}
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <div style={{fontSize:12,color:"#4b5563"}}>{item.done}/{item.camp.touches.length} done</div>
                    <button
                      onClick={function(){setDraftModal({con:item.con,acc:item.acc,camp:item.camp,touch:item.next,diff:item.diff});}}
                      style={{padding:"4px 12px",background:"#7c3aed",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700,color:"#fff"}}
                    >✍ Draft Message</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Draft Message Modal */}
      {draftModal && <DraftMessageModal item={draftModal} data={data} upd={upd} onClose={()=>setDraftModal(null)} demoMode={demoMode} />}

      {/* LinkedIn Import Modal */}
      {linkedInModal && <LinkedInImportModal data={data} upd={upd} onClose={()=>setLinkedInModal(false)} />}
    </div>
  );
}



function App({demoMode, onSignOut}) {

  const [genLogForm,    setGenLogForm]    = useState({type:"LinkedIn",otherType:"",notes:"",date:new Date().toISOString().slice(0,10),count:1,contactId:null,countAsCampaign:false});

  useEffect(()=>{
    if(demoMode) {
      setData(JSON.parse(JSON.stringify(DEFAULT_DATA)));

      loadData().then(setData);
    }
  },[]);
  useEffect(()=>{
    if(!data || demoMode) return;
    setSyncStatus("saving");
    if(_saveTimer) clearTimeout(_saveTimer);
    _saveTimer = setTimeout(async()=>{
      try {
        await saveData(data);
        setSyncStatus("saved");
        setTimeout(()=>setSyncStatus("idle"),2000);
      } catch(e) {
        setSyncStatus("error");
      }
    },1200);
  },[data]);

  if(!data) return <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.textLo,fontFamily:C.sans,fontSize:18}}>Loading SalesOS...</div>;

  const navTo = (newView, opts={}) => {
    setBackStack(s => [...s, {view, selAcc, selCon, selJob, accTab}]);
    if(opts.accId !== undefined) setSA(opts.accId);
    if(opts.conId !== undefined) setSC(opts.conId);
    if(opts.jobId !== undefined) setSJ(opts.jobId);

    setView(newView);
  };
  const navBack = () => {
    setBackStack(s => {
      if(!s.length) return s;
      const prev = s[s.length-1];
      setSA(prev.selAcc); setSC(prev.selCon); setSJ(prev.selJob);
      setAccTab(prev.accTab || "contacts");
      setView(prev.view);
      return s.slice(0,-1);
    });
  };

  const upd = fn => setData(prev => fn(cloneData(prev)));
  const ff  = k  => e => setForm(f=>({...f,[k]:e.target.value}));
  const fv  = (k,v) => setForm(f=>({...f,[k]:v}));

  const gAcc = (id) => { if(id===undefined)id=selAcc; return data.accounts.find(a=>a.id===id); };
  const gCon = (id) => { if(id===undefined)id=selCon; return gAcc()&&gAcc().contacts.find(c=>c.id===id); };
  const gJob = (id) => { if(id===undefined)id=selJob; return gAcc()&&gAcc().jobs.find(j=>j.id===id); };

  const {yellowThreshold:YT,redThreshold:RT,userName,markets:allMarkets} = data.settings;

  const alerts = [];
  data.accounts.forEach(acc=>acc.contacts.forEach(con=>con.activities.forEach(act=>{
    if(!act.followUp||!isOverdue(act.followUp)) return;
    if(act.jobId){const lj=acc.jobs.find(j=>j.id===act.jobId);if(lj&&lj.status==="Budget / Budgetary Only") return;}
    alerts.push({accName:acc.name,conName:con.name,type:act.type,followUp:act.followUp,accId:acc.id,conId:con.id});
  })));

  const pipeSummary = acc => {
    const active = acc.jobs.filter(j=>!["Won","Lost"].includes(j.status)).length;
    const won    = acc.jobs.filter(j=>j.status==="Won").length;
    const total  = acc.jobs.length;
    // For each job, get best value: last proposal amount, or estimatedValue
    const jobVal = j => {
      const lp = j.proposals[j.proposals.length-1];
      const v  = lp ? parseCur(lp.amount) : parseCur(j.estimatedValue);
      return isNaN(v) ? 0 : v;
    };
    const wonVal     = acc.jobs.filter(j=>j.status==="Won").reduce((s,j)=>s+jobVal(j),0);
    const lostVal    = acc.jobs.filter(j=>j.status==="Lost").reduce((s,j)=>s+jobVal(j),0);
    const pendingVal = acc.jobs.filter(j=>j.status==="Proposal Pending").reduce((s,j)=>s+jobVal(j),0);
    const totalVal   = wonVal + lostVal + pendingVal;
    return {active, won, total, wonVal, lostVal, pendingVal, totalVal,
      val: wonVal + pendingVal}; // keep legacy val for compat
  };

  const filteredAccs = mktF.length===0 ? data.accounts : data.accounts.filter(a=>mktF.every(m=>(a.markets||[]).includes(m)));

  const allJobs = data.accounts.flatMap(a=>a.jobs);
  const jVal = j => { const lp=j.proposals[j.proposals.length-1]; const v=lp?parseCur(lp.amount):parseCur(j.estimatedValue); return isNaN(v)?0:v; };
  // 12-month rolling window for KPIs
  const now12 = new Date(); now12.setFullYear(now12.getFullYear()-1);
  const inWindow = j => {
    if(!["Won","Lost"].includes(j.status)) return true; // active jobs always included
    const ref = j.dueDate ? new Date(j.dueDate) : (j.proposals.length>0 ? new Date(j.proposals[j.proposals.length-1].submittedDate||"") : null);
    return ref && ref >= now12;
  };
  const windowJobs  = allJobs.filter(inWindow);
  const decidedJobs = windowJobs.filter(j=>j.status==="Won"||j.status==="Lost");
  const winRate     = decidedJobs.length>0 ? Math.round(decidedJobs.filter(j=>j.status==="Won").length/decidedJobs.length*100) : null;
  const wonBidVal     = windowJobs.filter(j=>j.status==="Won").reduce((s,j)=>s+jVal(j),0);
  const lostBidVal    = windowJobs.filter(j=>j.status==="Lost").reduce((s,j)=>s+jVal(j),0);
  const activeBidVal  = windowJobs.filter(j=>j.status==="Active Pursuit").reduce((s,j)=>s+jVal(j),0);
  const pendingBidVal = windowJobs.filter(j=>j.status==="Proposal Pending").reduce((s,j)=>s+jVal(j),0);
  const budgetBidVal  = windowJobs.filter(j=>j.status==="Budget / Budgetary Only").reduce((s,j)=>s+jVal(j),0);
  const totalBidVal   = windowJobs.reduce((s,j)=>s+jVal(j),0);
  const pipeSegs = [
    {key:"Won",                    val:wonBidVal,     color:C.green},
    {key:"Active Pursuit",         val:activeBidVal,  color:C.blue},
    {key:"Proposal Pending",       val:pendingBidVal, color:"#c8980a"},
    {key:"Budget / Budgetary Only",val:budgetBidVal,  color:C.textLo},
    {key:"Lost",                   val:lostBidVal,    color:C.red},
  ].filter(s=>s.val>0);

  // -- activity KPIs ----------------------------------------------
  const allActs = data.accounts.flatMap(a=>a.contacts.flatMap(c=>c.activities));
  const now30   = new Date(); now30.setDate(now30.getDate()-30);
  const touchThisMonth = allActs.filter(a=>new Date(a.date)>=now30).length;

  // activity type counts (top 6)
  const actTypeCounts = {};
  allActs.forEach(a=>{ actTypeCounts[a.type]=(actTypeCounts[a.type]||0)+1; });
  const actTypeTop = Object.entries(actTypeCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const actTypeTotal = actTypeTop.reduce((s,[,n])=>s+n,0);

  // avg days between contacts per account (accounts that have 2+ activities)
  const avgGaps = [];
  data.accounts.forEach(acc=>{
    const acts = acc.contacts.flatMap(c=>c.activities).map(a=>new Date(a.date)).sort((a,b)=>a-b);
    for(let i=1;i<acts.length;i++) avgGaps.push((acts[i]-acts[i-1])/86400000);
  });
  const avgDaysBetween = avgGaps.length ? Math.round(avgGaps.reduce((s,g)=>s+g,0)/avgGaps.length) : null;

  const searchResults = (q) => {
    if(!q||q.length<2) return [];
    const ql = q.toLowerCase();
    const res = [];
    data.accounts.forEach(acc=>{
      if(acc.name.toLowerCase().includes(ql)||(acc.industry||"").toLowerCase().includes(ql))
        res.push({type:"account",label:acc.name,sub:acc.industry||"Account",accId:acc.id});
      (acc.contacts||[]).forEach(con=>{
        if(con.name.toLowerCase().includes(ql)||(con.title||"").toLowerCase().includes(ql)||(con.email||"").toLowerCase().includes(ql))
          res.push({type:"contact",label:con.name,sub:(con.title?con.title+" at ":"")+acc.name,accId:acc.id,conId:con.id});
      });
      (acc.jobs||[]).forEach(job=>{
        if(job.name.toLowerCase().includes(ql)||(job.location||"").toLowerCase().includes(ql))
          res.push({type:"job",label:job.name,sub:job.status+" - "+acc.name,accId:acc.id,jobId:job.id,status:job.status});
      });

    return res.slice(0,12);

  const saveAcc = isNew => {

  const saveJob = isNew => {

    else upd(d=>{Object.assign(d.accounts.find(a=>a.id===selAcc).jobs.find(j=>j.id===form.id),b);return d;});

  };
  const saveAct = isNew => {

    else upd(d=>{const acts=d.accounts.find(a=>a.id===selAcc).contacts.find(c=>c.id===selCon).activities;Object.assign(acts.find(x=>x.id===form.id),b);acts.sort((a,b)=>new Date(b.date)-new Date(a.date));return d;});
    closeModal();

  const saveProp = isNew => {
    const b={amount:form.amount||"",submittedDate:form.submittedDate||new Date().toISOString().slice(0,10),notes:form.notes||"",outcome:form.outcome||"Pending"};

  const saveSettings = () => {

    closeModal();
  };
  const saveMarkets = () => {
    upd(d=>{d.settings.markets=(form.marketList||"").split("\n").map(s=>s.trim()).filter(Boolean);return d;});
