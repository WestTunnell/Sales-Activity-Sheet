  };

  const delAct  = id => upd(d=>{const c=d.accounts.find(a=>a.id===selAcc).contacts.find(c=>c.id===selCon);c.activities=c.activities.filter(x=>x.id!==id);return d;});
  const delCon  = id => {upd(d=>{d.accounts.find(a=>a.id===selAcc).contacts=d.accounts.find(a=>a.id===selAcc).contacts.filter(c=>c.id!==id);return d;});setSC(null);setView("account");};
  const delJob  = id => {upd(d=>{d.accounts.find(a=>a.id===selAcc).jobs=d.accounts.find(a=>a.id===selAcc).jobs.filter(j=>j.id!==id);return d;});setSJ(null);setView("account");};
  const delProp = (jid,pid) => upd(d=>{const j=d.accounts.find(a=>a.id===selAcc).jobs.find(j=>j.id===jid);j.proposals=j.proposals.filter(p=>p.id!==pid);return d;});
  const delAcc  = id => {upd(d=>{d.accounts=d.accounts.filter(a=>a.id!==id);return d;});setView("dash");setSA(null);};
  const setTier = (id,t) => upd(d=>{d.accounts.find(a=>a.id===id).tier=t;return d;});

  const openQuickLog = (accId, e) => {
    e.stopPropagation();
    const acc = data.accounts.find(a=>a.id===accId);
    if(!acc||acc.contacts.length===0){alert("Add a contact to this account first.");return;}
    setSA(accId);
    setForm({quickAccId:accId});
    setModal("quickLog");

  const getWeekBounds = () => {
    const now=new Date(), day=now.getDay();
    const mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1)); mon.setHours(0,0,0,0);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
    return {mon,sun};
  };
  const saveGeneralActivity = () => {
    const actType = genLogForm.type==="Other" ? (genLogForm.otherType||"Other") : genLogForm.type;
    upd(d=>{
      if(!d.generalActivities) d.generalActivities=[];
      d.generalActivities.unshift({id:uid(),type:actType,notes:genLogForm.notes,
        date:genLogForm.date,count:parseInt(genLogForm.count)||1,
        contactId:genLogForm.contactId||null,createdAt:new Date().toISOString()});
      // If linked to a contact, also add to their activity log
      if(genLogForm.contactId) {
        d.accounts.forEach(acc=>{
          const con = acc.contacts.find(c=>c.id===genLogForm.contactId);
          if(con){
            con.activities.unshift({id:uid(),type:actType,date:genLogForm.date,
              notes:genLogForm.notes,followUp:null,jobId:null,fromOutreachLog:true});
            // Advance campaign if opted in
            if(genLogForm.countAsCampaign && con.campaign && con.campaign.status==="active"){
              const camp = con.campaign;
              const nextTouch = camp.touches.find(t=>!t.completedAt);
              if(nextTouch){
                nextTouch.completedAt = genLogForm.date;
                nextTouch.activityType = actType;
                // Set due date for next touch
                const nextIdx = camp.touches.indexOf(nextTouch)+1;

    const openMergeContacts = () => {

    const THRESHOLD = 0.55;
    const pairs = [];
    const used = new Set();
    const contacts = acc.contacts.slice();
    for(var i=0;i<contacts.length;i++){
      for(var j=i+1;j<contacts.length;j++){
        if(used.has(contacts[i].id)||used.has(contacts[j].id)) continue;
        const s = nameSimilarity(contacts[i].name, contacts[j].name);
        if(s>=THRESHOLD){
          pairs.push({a:contacts[i], b:contacts[j], score:s});
          used.add(contacts[i].id);
          used.add(contacts[j].id);
        }
      }
    }
    if(pairs.length===0){alert("No similar contacts found in this account.");return;}
    setMergeConPairs(pairs);
    setMergeConDecs({});
    setModal("mergeContacts");

        const dec = snapDecs[pair.a.id+":"+pair.b.id];
        if(!dec||dec==="skip") return;
        // keepId is the one to keep, dropId is the one to remove
        const keepId = dec;
        const dropId = dec===pair.a.id ? pair.b.id : pair.a.id;
        const keepCon = acc.contacts.find(c=>c.id===keepId);
        const dropCon = acc.contacts.find(c=>c.id===dropId);
        if(!keepCon||!dropCon) return;
        // Merge activities from dropCon into keepCon (avoid exact date+type dupes)
        dropCon.activities.forEach(act=>{
          const isDupe = keepCon.activities.some(a=>a.date===act.date&&a.type===act.type);
          if(!isDupe) keepCon.activities.push({...act, id:uid()});
        });
        // Sort merged activities by date desc
        keepCon.activities.sort((a,b)=>new Date(b.date)-new Date(a.date));
        // Fill in any blank fields on keepCon from dropCon
        if(!keepCon.title&&dropCon.title) keepCon.title=dropCon.title;
        if(!keepCon.email&&dropCon.email) keepCon.email=dropCon.email;
        if(!keepCon.phone&&dropCon.phone) keepCon.phone=dropCon.phone;
        if(!keepCon.notes&&dropCon.notes) keepCon.notes=dropCon.notes;
        // Remove the dropped contact
        acc.contacts = acc.contacts.filter(c=>c.id!==dropId);

    const con = gAcc() && gAcc().contacts.find(c=>c.id===selCon);
    const campaign = con && con.campaign && con.campaign.status==="active" ? con.campaign : null;
    const nextTouch = campaign ? campaign.touches.find(t=>!t.completedAt) : null;
    const completedCount = campaign ? campaign.touches.filter(t=>t.completedAt).length : 0;
    const [f, setF] = useState({type:form.type||"Email",date:form.date||new Date().toISOString().slice(0,10),jobId:form.jobId||"",notes:form.notes||"",followUp:form.followUp||"",countAsCampaign:false});

              <input type="checkbox" checked={f.countAsCampaign} onChange={e=>setF(p=>({...p,countAsCampaign:e.target.checked}))} style={{accentColor:C.gold,width:16,height:16}}/>

                <div style={{fontSize:13,color:C.gold,fontWeight:600}}>Count as Touch {completedCount+1} of {campaign.touches.length}</div>

              return (
                <div

                  style={{background:isChosen?"#f0fdf4":C.bg,border:"1px solid "+(isChosen?C.green+"80":C.border2),borderRadius:8,padding:"12px 14px",cursor:"pointer",transition:"all 0.15s",flex:1}}

              </div>
            );

  const MktBar = () => (

      <span style={{...lbl,marginRight:4}}>Filter:</span>
      {(allMarkets||[]).map(m=>{

  // ── CALENDAR VIEW ────────────────────────────────────────────────────────
  const CalendarView = ({data,setSA,setSC,setSJ,setView,setAccTab}) => {
    const [calMonth, setCalMonth] = React.useState(() => {
      const n = new Date(); return {year:n.getFullYear(), month:n.getMonth()};
    });
    const [selectedDay, setSelectedDay] = React.useState(null);
    const {year,month} = calMonth;
    const firstDay = new Date(year,month,1).getDay();
    const daysInMonth = new Date(year,month+1,0).getDate();
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    // Build event map keyed by day number - useMemo so it's stable across renders
    const eventsByDay = React.useMemo(function() {
      const map = {};
      function addEvent(day, event) {
        if(!map[day]) map[day] = [];
        map[day].push(event);
      }

    // 1. Job due dates (all active statuses)
    const ACTIVE_JOB_STATUSES = ["Active Pursuit","Proposal Pending","Budget / Budgetary Only","No Bid"];
    data.accounts.forEach(function(acc) {
      acc.jobs.filter(function(j){return j.dueDate&&ACTIVE_JOB_STATUSES.includes(j.status);}).forEach(function(j){
        const parts = j.dueDate.split("-");
        const d = parts.length===3 ? new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2])) : new Date(j.dueDate);
        if(d.getFullYear()===year && d.getMonth()===month){
          addEvent(d.getDate(), {type:"job", label:j.name, sub:acc.name+" · "+j.status, color:"#3b82f6", accId:acc.id, jobId:j.id});
        }
      });
    });

    // 2. Follow-up dates from contact activities
    data.accounts.forEach(function(acc) {
      acc.contacts.forEach(function(con) {
        (con.activities||[]).forEach(function(act) {
          if(!act.followUp) return;
          const fp = act.followUp.split("-");
          const d = fp.length===3 ? new Date(parseInt(fp[0]),parseInt(fp[1])-1,parseInt(fp[2])) : new Date(act.followUp);
          if(d.getFullYear()===year && d.getMonth()===month){
            addEvent(d.getDate(), {type:"followup", label:"Follow-up: "+con.name, sub:act.type+(act.notes?" · "+act.notes.slice(0,40):""), color:"#22c55e", accId:acc.id, conId:con.id});
          }
        });
      });
    });

    // 3. Campaign touch due dates
    data.accounts.forEach(function(acc) {
      acc.contacts.forEach(function(con) {
        const camp = con.campaign;
        if(!camp||camp.status!=="active") return;
        const next = camp.touches.find(function(t){return !t.completedAt;});
        if(!next||!next.dueDate) return;
        const d = new Date(next.dueDate);
        if(d.getFullYear()===year && d.getMonth()===month){
          addEvent(d.getDate(), {type:"campaign", label:camp.name+": "+next.label, sub:con.name+" @ "+acc.name, color:"#c8980a", accId:acc.id, conId:con.id});
        }
      });
    });

    // 4. General outreach log entries
    (data.generalActivities||[]).forEach(function(a) {
      if(!a.date) return;
      const dp = a.date.split("-");
      const d = dp.length===3 ? new Date(parseInt(dp[0]),parseInt(dp[1])-1,parseInt(dp[2])) : new Date(a.date);
      if(d.getFullYear()===year && d.getMonth()===month){
        addEvent(d.getDate(), {type:"outreach", label:a.type, sub:a.notes, color:"#7c3aed"});
      }
    });

    // 5. Logged contact activities (emails, calls, lunches, meetings etc)
    data.accounts.forEach(function(acc) {
      acc.contacts.forEach(function(con) {
        (con.activities||[]).forEach(function(act) {
          if(!act.date) return;
          const ap = act.date.split("-");
          const d = ap.length===3 ? new Date(parseInt(ap[0]),parseInt(ap[1])-1,parseInt(ap[2])) : new Date(act.date);
          if(d.getFullYear()===year && d.getMonth()===month){
            addEvent(d.getDate(), {
              type:"activity",
              label: act.type+": "+con.name,
              sub: (acc.name+(act.notes?" · "+act.notes.slice(0,50):"")),
              color:"#9ca3af",
              accId:acc.id,
              conId:con.id
            });
          }
        });
      });
    });
      return map;
    }, [data, year, month]);

    const today = new Date();
    const isToday = function(d) { return today.getFullYear()===year && today.getMonth()===month && today.getDate()===d; };
    const cells = [];
    for(let i=0;i<firstDay;i++) cells.push(null);
    for(let d=1;d<=daysInMonth;d++) cells.push(d);

    // Day breakout modal
    const DayModal = function() {
      if(!selectedDay) return null;
      const events = eventsByDay[selectedDay]||[];
      const dateStr = monthNames[month]+" "+selectedDay+", "+year;
      return (
        <div onClick={function(){setSelectedDay(null);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={function(e){e.stopPropagation();}} style={{background:"#13181a",border:"1px solid #2a2f35",borderRadius:14,padding:"20px 24px",width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div style={{fontFamily:"Georgia,serif",fontSize:18,color:"#f1f0f4"}}>{dateStr}</div>
              <button onClick={function(){setSelectedDay(null);}} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:20,lineHeight:1}}>&times;</button>
            </div>
            {events.length===0 && <div style={{color:"#6b7280",fontSize:13}}>Nothing scheduled.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {events.map(function(ev, i) {
                var typeLabels = {job:"Job Due",followup:"Follow-up",campaign:"Campaign Touch",outreach:"Outreach",activity:"Activity"};
                return (
                  <div key={i} onClick={function(){
                    if(ev.accId&&ev.conId){ setSA(ev.accId); setSC(ev.conId); setAccTab&&setAccTab("contacts"); setView("contact"); setSelectedDay(null); }
                    else if(ev.accId&&ev.jobId){ setSA(ev.accId); setSJ(ev.jobId); setView("job"); setSelectedDay(null); }
                  }} style={{padding:"10px 14px",background:"#1a1f24",border:"1px solid "+ev.color+"40",borderRadius:8,cursor:(ev.accId&&(ev.conId||ev.jobId))?"pointer":"default"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:ev.color,flexShrink:0,display:"inline-block"}}></span>
                      <span style={{fontSize:11,color:ev.color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>{typeLabels[ev.type]||ev.type}</span>
                    </div>
                    <div style={{fontSize:14,fontWeight:600,color:"#f1f0f4",marginBottom:2}}>{ev.label}</div>
                    {ev.sub && <div style={{fontSize:12,color:"#9ca3af"}}>{ev.sub}</div>}
                    {(ev.accId&&(ev.conId||ev.jobId)) && <div style={{fontSize:11,color:ev.color,marginTop:4}}>Tap to open →</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    return (
      <div>
        <DayModal/>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>setCalMonth(p=>{ let m=p.month-1,y=p.year; if(m<0){m=11;y--;} return {year:y,month:m}; })} style={{...btn(null,C.textLo,C.border2),padding:"5px 12px"}}>‹</button>
          <span style={{fontFamily:C.serif,fontSize:20,color:C.textHi,minWidth:180,textAlign:"center"}}>{monthNames[month]} {year}</span>
          <button onClick={()=>setCalMonth(p=>{ let m=p.month+1,y=p.year; if(m>11){m=0;y++;} return {year:y,month:m}; })} style={{...btn(null,C.textLo,C.border2),padding:"5px 12px"}}>›</button>
          <button onClick={()=>{ const n=new Date(); setCalMonth({year:n.getFullYear(),month:n.getMonth()}); }} style={{...btn(null,C.gold,C.border2),padding:"5px 12px",fontSize:12}}>Today</button>
          <div style={{display:"flex",alignItems:"center",gap:12,marginLeft:"auto",fontSize:11,color:C.textDim,flexWrap:"wrap"}}>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:"50%",background:"#3b82f6",display:"inline-block"}}></span>Job Due</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}></span>Follow-up</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:"50%",background:"#c8980a",display:"inline-block"}}></span>Campaign</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:"50%",background:"#7c3aed",display:"inline-block"}}></span>Outreach</span>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>(
            <div key={d} style={{textAlign:"center",fontSize:11,color:C.textDim,padding:"6px 0",letterSpacing:"0.06em",textTransform:"uppercase"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {cells.map((d,i)=>{
            if(!d) return <div key={"e"+i} style={{minHeight:90,background:C.surface,borderRadius:6,opacity:0.3}}/>;
            const events = eventsByDay[d]||[];
            const dots = {};
            events.forEach(function(ev){ dots[ev.color]=true; });
            return (
              <div key={d} onClick={function(){setSelectedDay(d);}}
                style={{minHeight:90,background:isToday(d)?"#1a1f10":C.surface,border:"1px solid "+(isToday(d)?C.gold+"60":C.border),borderRadius:6,padding:4,cursor:events.length>0?"pointer":"default",transition:"border-color 0.15s"}}
                onMouseEnter={function(e){if(events.length>0) e.currentTarget.style.borderColor=C.gold+"80";}}
                onMouseLeave={function(e){e.currentTarget.style.borderColor=isToday(d)?C.gold+"60":C.border;}}>
                <div style={{fontSize:12,fontWeight:isToday(d)?700:400,color:isToday(d)?C.gold:C.textDim,marginBottom:4,textAlign:"right",paddingRight:2}}>{d}</div>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  {events.slice(0,3).map(function(ev,ei){
                    return (
                      <div key={ei} style={{fontSize:10,padding:"2px 5px",borderRadius:4,background:ev.color+"22",color:ev.color,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontWeight:500}}>
                        {ev.label}
                      </div>
                    );
                  })}
                  {events.length>3 && <div style={{fontSize:10,color:C.textDim,paddingLeft:5}}>+{events.length-3} more</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  const MapView = ({data,setSA,setSJ,setView}) => {
    const mapRef = React.useRef(null);
    const mapInstance = React.useRef(null);
    const geocacheRef = React.useRef({});
    const [loading, setLoading] = React.useState(true);
    const [showMissingList, setShowMissingList] = React.useState(false);

    // Gather all active jobs with/without locations
    const jobsWithLoc = [];
    const jobsMissingLoc = [];
    data.accounts.forEach(acc => {
      acc.jobs.filter(j=>j.status!=="Lost").forEach(j=>{
        if(j.location&&j.location.trim()) jobsWithLoc.push({...j, accId:acc.id, accName:acc.name, accTier:acc.tier});
        else jobsMissingLoc.push({...j, accId:acc.id, accName:acc.name, accTier:acc.tier});
      });
    });

    React.useEffect(()=>{
      if(!document.getElementById("leaflet-css")){
        const link=document.createElement("link");
        link.id="leaflet-css"; link.rel="stylesheet";
        link.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";
        document.head.appendChild(link);
      }
      const loadLeaflet = () => new Promise((res,rej)=>{
        if(window.L){res(window.L);return;}
        const s=document.createElement("script");
        s.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
        s.onload=()=>res(window.L); s.onerror=rej;
        document.head.appendChild(s);
      });

      loadLeaflet().then(L=>{
        setLoading(false);
        if(!mapRef.current||mapInstance.current) return;
        const map = L.map(mapRef.current).setView([33.4484,-112.0740],8);
        mapInstance.current = map;
        setTimeout(()=>map.invalidateSize(),150);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
          attribution:"© OpenStreetMap contributors", maxZoom:18
        }).addTo(map);

        // Geocode with caching - group by unique location to minimize API calls
        const locationGroups = {};
        jobsWithLoc.forEach(j=>{
          const key = j.location.trim().toLowerCase();
          if(!locationGroups[key]) locationGroups[key] = {location:j.location, jobs:[]};
          locationGroups[key].jobs.push(j);
        });

        const addMarkers = (lat, lon, jobs) => {
          const domJob = jobs.find(j=>STATUS_COLORS[j.status]) || jobs[0];
          const sc = domJob ? STATUS_COLORS[domJob.status]||"#6b7280" : "#6b7280";
          const count = jobs.length;
          const size = count > 1 ? 28 : 18;
          const inner = count > 1
            ? '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+sc+';border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:sans-serif">'+count+'</div>'
            : '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+sc+';border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>';
          const icon = L.divIcon({html:inner,className:"",iconSize:[size,size],iconAnchor:[size/2,size/2]});
          const accLabel = jobs[0]&&jobs[0].accName ? '<div style="color:#888;font-size:12px;margin-bottom:6px">'+jobs[0].accName+'</div>' : "";
          const popupLines = jobs.map(j=>'<div style="margin-bottom:4px"><strong>'+j.name+'</strong> ('+j.status+')'+(j.estimatedValue?' &middot; '+j.estimatedValue:'')+'</div>').join("");
          L.marker([parseFloat(lat), parseFloat(lon)], {icon})
            .bindPopup('<div style="font-family:sans-serif;font-size:13px;min-width:160px">'+accLabel+popupLines+'</div>')
            .on("click",()=>{ if(count===1) navTo("job",{accId:jobs[0].accId,jobId:jobs[0].id}); })
            .addTo(map);
        };

        // Process each unique location with caching
        let geoDelay=0;
        Object.entries(locationGroups).forEach(([key, group])=>{
          if(geocacheRef.current[key]){
            const {lat,lon} = geocacheRef.current[key];
            addMarkers(lat, lon, group.jobs);
          } else {
            setTimeout(()=>{
            const query = encodeURIComponent(group.location+", AZ, USA");
            fetch("https://nominatim.openstreetmap.org/search?format=json&q="+query+"&limit=1")
              .then(r=>r.json())
              .then(results=>{
                if(!results||!results[0]) return;
                const {lat,lon} = results[0];
                geocacheRef.current[key] = {lat,lon};
                addMarkers(lat, lon, group.jobs);
              }).catch(()=>{});
            }, geoDelay); geoDelay+=120;
          }
        });

        window._mapJobClick = (accId,jobId) => {
          navTo("job",{accId,jobId});
        };
      }).catch(()=>setLoading(false));

      return () => {
        if(mapInstance.current){ mapInstance.current.remove(); mapInstance.current=null; }
        delete window._mapJobClick;
      };
    },[]);

    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{fontSize:13,color:C.textDim}}>{jobsWithLoc.length} jobs plotted</div>
          {jobsMissingLoc.length>0&&(
            <button onClick={()=>setShowMissingList(s=>!s)}
              style={{...btn(null,C.amber,"#d9770630"),fontSize:12,padding:"4px 10px"}}>
              ⚠ {jobsMissingLoc.length} missing location {showMissingList?"▲":"▼"}
            </button>
          )}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginLeft:"auto"}}>
            {Object.entries(STATUS_COLORS).filter(([s])=>s!=="Lost").map(([s,col])=>(
              <span key={s} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.textDim}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:col,display:"inline-block"}}/>
                {s}
              </span>
            ))}
          </div>
        </div>
        {showMissingList&&jobsMissingLoc.length>0&&(
          <div style={{background:"#fffbeb",border:"1px solid #d97706",borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{fontWeight:700,color:C.amber,fontSize:13,marginBottom:10}}>Jobs missing a location — click to add one:</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {jobsMissingLoc.map(j=>(
                <div key={j.id+j.accId}
                  onClick={()=>navTo("job",{accId:j.accId,jobId:j.id})}
                  style={{background:"#fff",border:"1px solid #fcd34d",borderRadius:8,padding:"8px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor="#d97706"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor="#fcd34d"}>
                  <div>
                    <div style={{fontWeight:700,color:C.textHi,fontSize:13}}>{j.name}</div>
                    <div style={{fontSize:11,color:C.textDim}}>{j.accName}</div>
                  </div>
                  <span style={{...pill(STATUS_COLORS[j.status]||C.textDim),fontSize:10}}>→</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {loading&&<div style={{textAlign:"center",color:C.textDim,padding:40}}>Loading map…</div>}
        <div ref={mapRef} style={{width:"100%",height:500,borderRadius:12,border:"1px solid "+C.border,display:loading?"none":"block"}}/>
        {!loading&&jobsWithLoc.length===0&&(
          <div style={{...card,textAlign:"center",color:C.textDim,padding:48}}>No jobs have locations set yet. Click a job in the missing list above to add one.</div>
        )}
      </div>
    );
  };

  const ActivityFeedView = ({feedFilter,data,setSA,setSC,setSJ,setView,setAccTab}) => {
    const TYPE_COLORS = {
      "Email":C.blue,"Proposal":C.gold,"Phone Call":C.purple,
      "Coffee":C.green,"Lunch":C.green,"Happy Hour":C.green,
      "Market Event":C.amber,"Entertainment":C.amber,"Site Visit":C.amber,
      "LinkedIn Connection Request":"#0077b5","LinkedIn Message":"#0077b5","LinkedIn Engagement":"#0077b5",
      "Other":C.textDim
    };
    const allActs = data.accounts.flatMap(acc=>
      acc.contacts.flatMap(con=>
        con.activities.map(act=>({
          ...act,
          accId:acc.id, accName:acc.name, accTier:acc.tier,
          conId:con.id, conName:con.name, conTitle:con.title,
          jobName: (acc.jobs.find(j=>j.id===act.jobId)||{}).name || null,
          jobId: act.jobId || null,
        }))
      )
    ).sort((a,b)=>new Date(b.date)-new Date(a.date));

    const filtered = feedFilter==="all" ? allActs : allActs.filter(a=>a.type===feedFilter);

    if(filtered.length===0) return (
      <div style={{...card,color:C.textDim,textAlign:"center",padding:48,fontSize:13}}>
        {feedFilter==="all" ? "No activities logged yet." : "No activities of this type logged yet."}
      </div>
    );

    // Group by date
    const groups = [];
    let currentDate = null;
    filtered.forEach(act => {
      if(act.date !== currentDate) {
        currentDate = act.date;
        groups.push({date:act.date, acts:[]});
      }
      groups[groups.length-1].acts.push(act);
    });

    const fmtDate = d => {
      const dt = new Date(d+"T12:00:00");
      const today = new Date(); today.setHours(12,0,0,0);
      const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
      if(dt.toDateString()===today.toDateString()) return "Today";
      if(dt.toDateString()===yesterday.toDateString()) return "Yesterday";
      return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:dt.getFullYear()!==today.getFullYear()?"numeric":undefined});
    };

    return (
      <div>
        <div style={{fontSize:12,color:C.textDim,marginBottom:18}}>
          {filtered.length} {feedFilter==="all"?"activities":feedFilter+" activities"} across {new Set(filtered.map(a=>a.accId)).size} accounts
        </div>
        {groups.map(group=>(
          <div key={group.date} style={{marginBottom:24}}>
            <div style={{fontSize:11,fontWeight:700,color:C.textDim,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>

  const JobListView = ({jobSort,inWindow,jVal,setSA,setSJ,setView,data,statusFilter,setStatusFilter}) => {
    const STATUS_ORDER={"Active Pursuit":0,"Proposal Pending":1,"Budget / Budgetary Only":2,"Won":3,"Lost":4};
    const flatJobs=data.accounts.flatMap(acc=>
      acc.jobs.filter(j=>statusFilter ? j.status===statusFilter : ["Active Pursuit","Proposal Pending"].includes(j.status)).map(j=>{
        const linkedActs=acc.contacts.flatMap(c=>c.activities.filter(a=>a.jobId===j.id)).sort((a,b)=>new Date(b.date)-new Date(a.date));
        const linkedCons=acc.contacts.filter(c=>c.activities.some(a=>a.jobId===j.id));
        return {...j,accId:acc.id,accName:acc.name,accTier:acc.tier,linkedAct:linkedActs[0]||null,linkedCons};
      })
    );
    const sorted=[...flatJobs].sort((a,b)=>{
      if(jobSort==="due"){
        if(!a.dueDate) return 1;
        if(!b.dueDate) return -1;
        return new Date(a.dueDate)-new Date(b.dueDate);
      }
      if(jobSort==="value") return jVal(b)-jVal(a);
      if(jobSort==="status") return (STATUS_ORDER[a.status]||99)-(STATUS_ORDER[b.status]||99)||a.name.localeCompare(b.name);
      if(jobSort==="recent"){
        return (b.linkedAct?new Date(b.linkedAct.date):new Date(0))-(a.linkedAct?new Date(a.linkedAct.date):new Date(0));
      }
      return 0;
    });
    if(sorted.length===0) return (
      <div>
        {statusFilter&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><span style={{...pill(STATUS_COLORS[statusFilter]||C.textDim),fontSize:12}}>Filtered: {statusFilter}</span><button onClick={()=>setStatusFilter(null)} style={{...btn(null,C.textLo,C.border2),padding:"3px 10px",fontSize:12}}>✕ Clear</button></div>}
        <div style={{...card,color:C.textDim,textAlign:"center",padding:48,fontSize:13}}>No jobs found.</div>
      </div>
    );
    const noDates=sorted.filter(j=>!j.dueDate).length;
    const today=new Date();
    return (
      <div>
        {statusFilter&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><span style={{...pill(STATUS_COLORS[statusFilter]||C.textDim),fontSize:12}}>Filtered: {statusFilter}</span><button onClick={()=>setStatusFilter(null)} style={{...btn(null,C.textLo,C.border2),padding:"3px 10px",fontSize:12}}>✕ Clear filter</button></div>}
        <div style={{fontSize:12,color:C.textDim,marginBottom:14}}>
          {sorted.length} jobs{statusFilter?" matching filter":" in the last 12 months"}
          {noDates>0&&jobSort==="due"&&<span style={{color:C.amber,marginLeft:8}}>{noDates} missing due date</span>}
        </div>
        {sorted.map(j=>{
          const sc=STATUS_COLORS[j.status]||C.textDim;
          const val=jVal(j);
          const daysToDD=j.dueDate?Math.ceil((new Date(j.dueDate)-today)/86400000):null;
          const actDs=j.linkedAct?daysSince(j.linkedAct.date):null;
          const actCol=actColor(actDs,YT,RT);
          const lp=j.proposals.length>0?j.proposals[j.proposals.length-1]:null;
          return (
            <div key={j.id+j.accId} style={{...card,marginBottom:8,cursor:"pointer",padding:"13px 18px"}}
              onClick={()=>navTo("job",{accId:j.accId,jobId:j.id})}
              onMouseEnter={e=>e.currentTarget.style.borderColor=sc+"80"}
              onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,color:C.textHi,fontSize:15}}>{j.name}</span>
                    {tag(sc,j.status)}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.textDim,flexWrap:"wrap"}}>
                    <span style={{color:C.textLo}}>{j.accName}</span>
                    {j.location&&<span>{"| "+j.location}</span>}
                    {tag(TIER_COLORS[j.accTier],"T"+j.accTier)}
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                  {val>0&&<span style={{fontWeight:700,color:C.gold,fontSize:15}}>{fmt$(val)}</span>}
                  {!j.dueDate&&<span style={{fontSize:11,color:C.textDim,fontStyle:"italic"}}>No due date</span>}
                  {j.dueDate&&j.status!=="Budget / Budgetary Only"&&(daysToDD<0
                    ?<span style={{...pill(C.red),fontSize:11}}>{"Overdue "+Math.abs(daysToDD)+"d"}</span>
                    :daysToDD<=7
                      ?<span style={{...pill(C.red),fontSize:11}}>{"Due in "+daysToDD+"d"}</span>
                      :daysToDD<=21
                        ?<span style={{...pill(C.amber),fontSize:11}}>{"Due in "+daysToDD+"d"}</span>
                        :<span style={{fontSize:12,color:C.textDim}}>{"Due "+j.dueDate}</span>
                  )}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:14,marginTop:9,paddingTop:9,borderTop:"1px solid "+C.border,flexWrap:"wrap"}}>
                <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:actCol}}>
                  {dot(actCol)}{j.linkedAct?"Last activity "+actLabel(actDs):"No linked activity"}
                </span>
                {lp&&<span style={{fontSize:12,color:C.textDim}}>{"Proposal: "}<span style={{color:lp.outcome==="Won"?C.green:lp.outcome==="Lost"?C.red:C.gold,fontWeight:600}}>{lp.outcome}</span>{lp.amount?" - "+lp.amount:""}</span>}
                {j.linkedCons.length>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:4,marginLeft:"auto"}}>
                    {j.linkedCons.slice(0,4).map(c=>(
                      <div key={c.id} title={c.name} style={{width:22,height:22,borderRadius:"50%",background:"#e8e4f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:C.purple,fontWeight:700}}>

                      </div>
                    ))}
                    {j.linkedCons.length>4&&<span style={{fontSize:11,color:C.textDim}}>{"+"+(j.linkedCons.length-4)}</span>}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    );
  };

      <div style={{maxWidth:1200,margin:"0 auto",padding:isMobile?"16px 12px":"32px 24px"}}>
        {demoMode && (
          <div style={{background:"#7a5fc015",border:"1px solid #7a5fc040",borderRadius:10,padding:"10px 18px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:C.purple,fontWeight:600}}>✦ Demo Mode — You're exploring sample data. Nothing you do here is saved.</span>
            <button onClick={onSignOut} style={{...btn(null,C.purple,"#7a5fc040"),fontSize:12,padding:"4px 12px"}}>Exit Demo</button>
          </div>
        )}
        {view==="dash"    &&<DashView/>}
        {view==="account" &&<AccountView/>}
        {view==="job"     &&<JobView/>}
        {view==="contact" &&<ContactView/>}
        {/* Mobile bottom padding so FAB doesn't cover content */}
        {isMobile && <div style={{height:80}}/>}
      </div>
      <Modals/>
      {/* MOBILE FAB - Quick Log Activity */}
      {isMobile && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,padding:"10px 16px",display:"flex",gap:8,zIndex:200}}>
          <button
            onClick={()=>{setModal("globalSearch");}}
            style={{flex:1,background:C.bg,border:`1px solid ${C.border2}`,borderRadius:10,padding:"10px 0",fontSize:12,fontWeight:600,color:C.textLo,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}
          >
            <span style={{fontSize:18}}>🔍</span>Search
          </button>
          <button
            onClick={()=>{ setModal("fabLog"); }}
            style={{flex:2,background:C.gold,border:"none",borderRadius:10,padding:"10px 0",fontSize:13,fontWeight:700,color:"#0a0d13",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}
          >
            <span style={{fontSize:20}}>＋</span>Log Activity
          </button>
          <button
            onClick={()=>{setView("dash");setBackStack([]);setMobileMenuOpen(false);}}
            style={{flex:1,background:view==="dash"?C.gold+"22":C.bg,border:`1px solid ${view==="dash"?C.gold+"60":C.border2}`,borderRadius:10,padding:"10px 0",fontSize:12,fontWeight:600,color:view==="dash"?C.gold:C.textLo,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}
          >
            <span style={{fontSize:18}}>🏠</span>Home
          </button>
        </div>
      )}
    </div>
  );
}

function LoginScreen({ onLogin, onDemo }) {
  const [pw, setPw] = React.useState("");
  const [err, setErr] = React.useState(false);
  const [checking, setChecking] = React.useState(false);

  const attempt = async () => {
    if (!pw.trim()) return;
    setChecking(true);
    setErr(false);
    try {
      const { data } = await sb.from(SB_TABLE).select("payload").eq("id", "salesos_auth").single();
      let storedPw = "fairco2024";
      if (data && data.payload) {
        try { storedPw = JSON.parse(data.payload).password || storedPw; } catch(e){}
      }
      if (pw.trim() === storedPw) {
        localStorage.setItem("salesos_authed", "1");
        onLogin();
      } else {
        setErr(true);
      }
    } catch(e) {
      if (pw.trim() === "fairco2024") {
        localStorage.setItem("salesos_authed", "1");
        onLogin();
      } else {
        setErr(true);
      }
    }
    setChecking(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"#f0eff0",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans','Helvetica Neue',sans-serif"}}>
      <div style={{background:"#ffffff",border:"1px solid #e0dde0",borderRadius:16,padding:"40px 48px",width:"100%",maxWidth:400,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,0.06)"}}>
        <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:28,color:"#1a1820",marginBottom:4}}>
          Sales<span style={{color:"#c8980a"}}>OS</span>
        </div>
        <div style={{color:"#7a7880",fontSize:13,marginBottom:32}}>BD Pipeline & Relationship Manager</div>
        <input
          type="password"
          placeholder="Password"
          value={pw}
          onChange={e=>{setPw(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          style={{width:"100%",background:"#f8f7f8",border:`1px solid ${err?"#dc2626":"#d0cdd0"}`,borderRadius:8,color:"#3a3840",padding:"10px 14px",fontSize:14,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",outline:"none",marginBottom:8}}
          autoFocus
        />
        {err && <div style={{color:"#dc2626",fontSize:12,marginBottom:8,textAlign:"left"}}>Incorrect password</div>}
        <button
          onClick={attempt}
          disabled={checking}
          style={{width:"100%",background:"#c8980a",color:"#0a0d13",border:"none",borderRadius:8,padding:"10px 0",fontSize:14,fontWeight:700,cursor:checking?"wait":"pointer",fontFamily:"'DM Sans',sans-serif",marginBottom:12}}
        >
          {checking ? "Checking..." : "Sign In"}
        </button>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{flex:1,height:1,background:"#e0dde0"}}/>
          <span style={{fontSize:12,color:"#aaa8b0"}}>or</span>
          <div style={{flex:1,height:1,background:"#e0dde0"}}/>
        </div>
        <button
          onClick={onDemo}
          style={{width:"100%",background:"transparent",color:"#7a5fc0",border:"1px solid #7a5fc040",borderRadius:8,padding:"10px 0",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}
        >
          ✦ Try Demo
        </button>
        <div style={{fontSize:11,color:"#aaa8b0",marginTop:10}}>Demo mode — explore freely, no data is saved</div>
      </div>
    </div>
  );
}

function Root() {
  const [authed, setAuthed] = React.useState(!!localStorage.getItem("salesos_authed"));
  const [demoMode, setDemoMode] = React.useState(false);
  if (!authed && !demoMode) return <LoginScreen onLogin={()=>setAuthed(true)} onDemo={()=>setDemoMode(true)} />;
  return <App demoMode={demoMode} onSignOut={()=>{localStorage.removeItem("salesos_authed");setAuthed(false);setDemoMode(false);}} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
